<!-- PATCH: Accessibility fixes — manual review recommended before merge -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Tanda - Panel de inicio</title>
  <style>
    body { font-family: sans-serif; color: #333; background: #fff; }
    .icon-btn { background: transparent; border: 1px solid #ccc; padding: 8px; cursor: pointer; }
    .icon-btn:hover { background: #f0f0f0; }
    .avatar { border-radius: 50%; width: 40px; height: 40px; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link" style="position:absolute;top:-40px;left:0;background:#000;color:#fff;padding:8px;z-index:100;transition:top 0.3s;">Saltar al contenido principal</a>
  <header>
    <button class="icon-btn" aria-label="Menu"><i class="fa fa-bars"></i></button>
    <h1>Panel</h1>
    <nav>
      <button class="icon-btn" aria-label="Configuracion"><i class="fa fa-cog"></i></button>
      <button class="icon-btn" aria-label="Notificaciones"><i class="fa fa-bell"></i></button>
      <img src="user-avatar.jpg" alt="Avatar del usuario" class="avatar">
    </nav>
  </header>
  <main id="main-content">
    <section>
      <h2>Resumen</h2>
      <img src="chart.png" alt="Grafico de resumen de actividad">
      <button aria-label="Ver actividad detallada">Detalles</button>
    </section>
  </main>
</body>
</html>
