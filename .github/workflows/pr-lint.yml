name: PR Code Pattern Check

on:
  pull_request:
    branches: [main]

jobs:
  pattern-check:
    name: Codebase Pattern Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get changed files
      id: changed
      run: |
        FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only origin/main...HEAD)
        echo "files<<EOF" >> $GITHUB_OUTPUT
        echo "$FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Check auth token pattern
      run: |
        echo "## Auth Token Check" >> $GITHUB_STEP_SUMMARY
        ERRORS=0

        # Only check JS files that were changed
        while IFS= read -r file; do
          [[ "$file" != *.js ]] && continue
          [[ ! -f "$file" ]] && continue
          [[ "$file" == node_modules/* ]] && continue
          [[ "$file" == smart-contracts/* ]] && continue

          # Wrong: sessionStorage for auth tokens
          if grep -n "sessionStorage.*['\"].*[Tt]oken\|sessionStorage.*['\"].*jwt\|sessionStorage.*['\"].*auth" "$file" 2>/dev/null; then
            echo "::error file=$file::Auth tokens must use localStorage, not sessionStorage. Use: localStorage.getItem('auth_token')"
            ERRORS=1
          fi

          # Wrong: just 'token' or 'jwtToken' without auth_token
          if grep -n "getItem(['\"]jwtToken['\"])" "$file" 2>/dev/null | grep -v "auth_token"; then
            echo "::error file=$file::Use localStorage.getItem('auth_token'), not 'jwtToken'"
            ERRORS=1
          fi

        done <<< "${{ steps.changed.outputs.files }}"

        if [ $ERRORS -eq 0 ]; then
          echo "- ✅ Auth token pattern OK" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Auth token pattern violations found" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "**Required pattern:** \`localStorage.getItem('auth_token') || localStorage.getItem('authToken')\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Check for Math.random()
      run: |
        echo "## Security: Math.random() Check" >> $GITHUB_STEP_SUMMARY
        ERRORS=0

        while IFS= read -r file; do
          [[ "$file" != *.js ]] && continue
          [[ ! -f "$file" ]] && continue
          [[ "$file" == node_modules/* ]] && continue
          [[ "$file" == smart-contracts/* ]] && continue

          if grep -n "Math\.random()" "$file" 2>/dev/null; then
            echo "::error file=$file::Math.random() is not allowed. Use crypto.randomInt() or crypto.getRandomValues()"
            ERRORS=1
          fi

        done <<< "${{ steps.changed.outputs.files }}"

        if [ $ERRORS -eq 0 ]; then
          echo "- ✅ No Math.random() found" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Math.random() found — use crypto.randomInt() or crypto.getRandomValues()" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Check for inline onclick handlers
      run: |
        echo "## Inline Handler Check" >> $GITHUB_STEP_SUMMARY
        ERRORS=0

        while IFS= read -r file; do
          [[ "$file" != *.html && "$file" != *.js ]] && continue
          [[ ! -f "$file" ]] && continue
          [[ "$file" == node_modules/* ]] && continue

          if grep -n 'onclick="' "$file" 2>/dev/null; then
            echo "::warning file=$file::Inline onclick handlers found. Use delegated event listeners with data-action attributes instead."
            ERRORS=1
          fi

        done <<< "${{ steps.changed.outputs.files }}"

        if [ $ERRORS -eq 0 ]; then
          echo "- ✅ No inline onclick handlers" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ⚠️ Inline onclick handlers found — use data-action + delegated listeners" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Check for fabricated URLs
      run: |
        echo "## URL Validation" >> $GITHUB_STEP_SUMMARY
        ERRORS=0

        while IFS= read -r file; do
          [[ ! -f "$file" ]] && continue
          [[ "$file" == node_modules/* ]] && continue

          # Known fabricated URLs from rejected PRs
          if grep -n "api\.latanda\.online\|my\.tanda\.co\|rpc\.latandachain\|explorer\.latandachain\|testnet-rpc\.latandachain" "$file" 2>/dev/null; then
            echo "::error file=$file::Fabricated URL detected. The real API is at latanda.online (no 'api.' prefix). Chain endpoints are at latanda.online/chain/rpc/ and latanda.online/chain/api/"
            ERRORS=1
          fi

        done <<< "${{ steps.changed.outputs.files }}"

        if [ $ERRORS -eq 0 ]; then
          echo "- ✅ No fabricated URLs" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Fabricated URLs found" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Check for files in wrong directories
      run: |
        echo "## File Location Check" >> $GITHUB_STEP_SUMMARY
        ERRORS=0

        while IFS= read -r file; do
          # No src/ directory exists
          if [[ "$file" == src/* ]]; then
            echo "::error file=$file::This repo has no src/ directory. See CONTRIBUTING.md for correct file paths."
            ERRORS=1
          fi
        done <<< "${{ steps.changed.outputs.files }}"

        if [ $ERRORS -eq 0 ]; then
          echo "- ✅ File locations OK" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Files in wrong directory" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Summary
      if: always()
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#-codebase-patterns-read-this-first) for all required patterns." >> $GITHUB_STEP_SUMMARY
