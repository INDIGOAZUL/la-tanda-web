name: PR Gatekeeper

on:
  pull_request_target:
    types: [opened]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - name: Checkout for ban list
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/ban-list.txt
          sparse-checkout-cone-mode: false

      - name: Gate check and auto-close
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const body = pr.body || '';
            const issues = [];
            let shouldClose = false;

            // --- Check 1: Ban list ---
            const fs = require('fs');
            try {
              const banList = fs.readFileSync('.github/ban-list.txt', 'utf8')
                .split('\n')
                .map(l => l.trim().toLowerCase())
                .filter(l => l && !l.startsWith('#'));
              if (banList.includes(author.toLowerCase())) {
                issues.push('Your account has been blocked from submitting PRs due to repeated policy violations.');
                shouldClose = true;
              }
            } catch (e) {
              // No ban list file — skip
            }

            // --- Check 2: Account age (30 days minimum) ---
            if (!shouldClose) {
              const { data: user } = await github.rest.users.getByUsername({ username: author });
              const accountAge = (Date.now() - new Date(user.created_at).getTime()) / (1000 * 60 * 60 * 24);
              if (accountAge < 30) {
                issues.push(`Account is ${Math.floor(accountAge)} days old. We require accounts to be at least 30 days old to prevent spam. Please try again later.`);
                shouldClose = true;
              }
            }

            // --- Check 3: Bounty assignment check ---
            if (!shouldClose) {
              const issueRefs = [];
              const patterns = [
                /(?:closes|fixes|resolves)\s+#(\d+)/gi,
                /(?:bounty|issue)\s*#(\d+)/gi,
                /(?:bounty|issue):\s*#(\d+)/gi
              ];
              for (const pattern of patterns) {
                let match;
                while ((match = pattern.exec(body)) !== null) {
                  issueRefs.push(parseInt(match[1]));
                }
              }
              // Also check PR title for issue refs
              const titleMatch = pr.title.match(/#(\d+)/g);
              if (titleMatch) {
                for (const m of titleMatch) {
                  issueRefs.push(parseInt(m.slice(1)));
                }
              }

              const uniqueIssues = [...new Set(issueRefs)];

              for (const issueNumber of uniqueIssues) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber
                  });
                  const labels = issue.data.labels.map(l => l.name);
                  const isBounty = labels.some(l => ['bounty', 'tier-0', 'tier-1', 'tier-2'].includes(l));

                  if (isBounty) {
                    const isAssigned = issue.data.assignees.some(a => a.login === author);
                    if (!isAssigned) {
                      issues.push(`Bounty issue #${issueNumber} is **not assigned to you**. Comment on the issue with your proposal and wait for assignment. See [CONTRIBUTING.md](https://github.com/INDIGOAZUL/la-tanda-web/blob/main/CONTRIBUTING.md#step-2-claim-it-mandatory).`);
                      shouldClose = true;
                    }
                  }
                } catch (e) {
                  // Issue not found — skip
                }
              }
            }

            // --- Check 4: Repeat offender warning ---
            if (!shouldClose) {
              try {
                const { data: closedPRs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'closed',
                  per_page: 100
                });
                const rejectedCount = closedPRs.filter(p =>
                  p.user.login === author && !p.merged_at
                ).length;
                if (rejectedCount >= 3) {
                  issues.push(`You have ${rejectedCount} previously rejected PRs. Please make sure you are assigned to the bounty issue and have followed all codebase patterns before submitting.`);
                }
              } catch (e) {
                // API error — skip
              }
            }

            // --- Take action ---
            if (issues.length > 0) {
              const closeNote = shouldClose
                ? '\n\n**This PR has been automatically closed.** Follow the process in [CONTRIBUTING.md](https://github.com/INDIGOAZUL/la-tanda-web/blob/main/CONTRIBUTING.md) and try again.'
                : '\n\nPlease address these issues or your PR may be closed.';

              const message = [
                '## PR Gatekeeper\n',
                ...issues.map(i => '- ' + i),
                closeNote
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });

              if (shouldClose) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed'
                });
              } else {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['needs-fix']
                });
              }
            }
