name: PR Gatekeeper

on:
  pull_request_target:
    types: [opened]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - name: Check verification and assignment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').toLowerCase();
            const hasVerification = body.includes('verification: tanda-protocol');
            const issues = [];

            // Check for verification keyword
            if (!hasVerification) {
              issues.push('Missing `Verification: TANDA-PROTOCOL` in PR description. This confirms you read [CONTRIBUTING.md](https://github.com/INDIGOAZUL/la-tanda-web/blob/main/CONTRIBUTING.md).');
            }

            // Check if PR references a bounty issue and if author is assigned
            const closesMatch = (pr.body || '').match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (closesMatch) {
              const issueNumber = parseInt(closesMatch[1]);
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                const isBounty = issue.data.labels.some(l => l.name === 'bounty');
                if (isBounty) {
                  const isAssigned = issue.data.assignees.some(a => a.login === pr.user.login);
                  if (!isAssigned) {
                    issues.push(`Bounty issue #${issueNumber} is not assigned to you. Please comment on the issue with your proposal and wait for assignment before submitting a PR.`);
                  }
                }
              } catch (e) {
                // Issue not found — skip check
              }
            }

            if (issues.length > 0) {
              const message = [
                '**PR Gatekeeper: Issues Found**\n',
                ...issues.map(i => '- ' + i),
                '\n---',
                'Please read [CONTRIBUTING.md](https://github.com/INDIGOAZUL/la-tanda-web/blob/main/CONTRIBUTING.md) fully before submitting.',
                'Fix these issues and update your PR, or it will be closed without review.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-fix']
              });
            }
