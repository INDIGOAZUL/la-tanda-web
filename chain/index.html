<script>
  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/\'/g, "&#039;");
  }

  // Search bar functionality
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', (e) => {
    const searchTerm = escapeHtml(e.target.value);
    if (searchTerm.startsWith('ltd')) {
      // Address search
      fetch(`latanda.online/chain/api/cosmos/auth/v1beta1/accounts/${searchTerm}`)
        .then((response) => response.json())
        .then((data) => {
          const balance = data.result.value.coins.find((coin) => coin.denom === 'ultd').amount;
          const delegations = data.result.value.delegations;
          // Display address detail view
          document.getElementById('address-detail').innerHTML = `
            <h2>Address: ${searchTerm}</h2>
            <p>Balance: ${balance / 1000000} LTD</p>
            <p>Delegations: ${delegations.length}</p>
          `;
        });
    } else if (searchTerm.length === 64) {
      // Transaction hash search
      fetch(`latanda.online/chain/rpc/tx?hash=${searchTerm}`)
        .then((response) => response.json())
        .then((data) => {
          const tx = data.result;
          // Display transaction detail view
          document.getElementById('transaction-detail').innerHTML = `
            <h2>Transaction Hash: ${tx.hash}</h2>
            <p>Block Height: ${tx.height}</p>
            <p>Gas: ${tx.gas}</p>
            <p>Timestamp: ${tx.timestamp}</p>
            <p>Messages: ${tx.messages.length}</p>
          `;
        });
    }
  });

  // URL hash routing
  window.addEventListener('hashchange', () => {
    const hash = window.location.hash;
    if (hash.startsWith('#tx/')) {
      const txHash = hash.substring(4);
      // Display transaction detail view
      fetch(`latanda.online/chain/rpc/tx?hash=${txHash}`)
        .then((response) => response.json())
        .then((data) => {
          const tx = data.result;
          document.getElementById('transaction-detail').innerHTML = `
            <h2>Transaction Hash: ${tx.hash}</h2>
            <p>Block Height: ${tx.height}</p>
            <p>Gas: ${tx.gas}</p>
            <p>Timestamp: ${tx.timestamp}</p>
            <p>Messages: ${tx.messages.length}</p>
          `;
        });
    } else if (hash.startsWith('#address/')) {
      const address = hash.substring(10);
      // Display address detail view
      fetch(`latanda.online/chain/api/cosmos/auth/v1beta1/accounts/${address}`)
        .then((response) => response.json())
        .then((data) => {
          const balance = data.result.value.coins.find((coin) => coin.denom === 'ultd').amount;
          const delegations = data.result.value.delegations;
          document.getElementById('address-detail').innerHTML = `
            <h2>Address: ${address}</h2>
            <p>Balance: ${balance / 1000000} LTD</p>
            <p>Delegations: ${delegations.length}</p>
          `;
        });
    }
  });
</script>
