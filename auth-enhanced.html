<!-- PATCH: Accessibility fixes — manual review recommended before merge -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Tanda - Autenticacion</title>
  <style>
    body { font-family: sans-serif; color: #333; background: #fff; }
    label { display: block; margin-top: 10px; }
    input { padding: 6px; margin-top: 4px; }
    button { background: #0056b3; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }
    button:hover { background: #004494; }
  </style>
</head>
<body>
  <main id="main-content">
    <h1>Iniciar sesion</h1>
    <form action="/login" method="post">
      <label for="username">Nombre de usuario:</label>
      <input type="text" id="username" name="username" required>
      <label for="password">Contrasena:</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Entrar</button>
    </form>
    <p>No tienes cuenta? <a href="/register">Registrate</a></p>
    <div>
      <button aria-label="Iniciar sesion con Google"><img src="google-icon.png" alt=""> Google</button>
      <button aria-label="Iniciar sesion con Facebook"><img src="facebook-icon.png" alt=""> Facebook</button>
    </div>
  </main>
</body>
</html>
