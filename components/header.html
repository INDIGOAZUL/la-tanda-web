<!-- ============================================
     LA TANDA - HEADER GLOBAL COMPONENT
     Version: 2.0 - Modern restructure
     ============================================ -->
<header class="lt-header" id="mainHeader">
    <div class="lt-header-container">
        <!-- Left: Menu + Brand -->
        <div class="lt-header-left">
            <button class="lt-menu-toggle" id="menuToggle" aria-label="Menu">
                <span class="lt-hamburger">
                    <span class="lt-hamburger-line"></span>
                    <span class="lt-hamburger-line"></span>
                    <span class="lt-hamburger-line"></span>
                </span>
            </button>
            <a href="home-dashboard.html" class="lt-brand">
                <img src="assets/logo-latanda-latest.png" alt="La Tanda" class="lt-brand-logo">
                <div class="lt-brand-text">
                    <span class="lt-brand-name">La Tanda</span>
                </div>
            </a>
        </div>

        <!-- Center: Search (desktop) / Rewards pill (mobile) -->
        <div class="lt-header-center">
            <!-- Search bar — desktop only -->
            <div class="lt-search-bar" id="headerSearchBar">
                <i class="fas fa-search lt-search-icon"></i>
                <input type="text" class="lt-search-input" id="headerSearchInput" placeholder="Buscar en La Tanda..." autocomplete="off" enterkeyhint="search">
            </div>
            <!-- Rewards pill — mobile only, desktop in right section -->
            <a href="recompensas.html" class="lt-rewards-pill lt-mobile-pill" id="rewardsPillMobile" title="Recompensas">
                <i class="fas fa-coins lt-rp-icon"></i>
                <span class="lt-rp-text" id="rewardsPillMobileText">...</span>
                <span class="lt-rp-badge" id="rewardsPillMobileBadge" style="display:none"></span>
            </a>
        </div>

        <!-- Right: Balance + Notifications + Profile -->
        <div class="lt-header-right">
            <!-- LTD Balance mini — desktop only -->
            <div class="lt-balance-mini" id="balanceMini">
                <button class="lt-balance-btn" id="balanceBtn" aria-label="Balance LTD">
                    <span class="lt-balance-amount" id="headerLtdBalance">0 LTD</span>
                    <i class="fas fa-chevron-down lt-balance-arrow"></i>
                </button>
                <!-- Mini dropdown -->
                <div class="lt-balance-dropdown" id="balanceDropdown" style="display:none">
                    <div class="lt-bd-balance">
                        <div class="lt-bd-amount" id="dropdownLtdBalance">0.0</div>
                        <div class="lt-bd-label">LTD disponibles</div>
                    </div>
                    <div class="lt-bd-links">
                        <a href="my-wallet.html" class="lt-bd-link"><i class="fas fa-wallet"></i> Mi Wallet</a>
                        <a href="recompensas.html" class="lt-bd-link"><i class="fas fa-gift"></i> Recompensas</a>
                        <a href="mineria.html" class="lt-bd-link"><i class="fas fa-hammer"></i> Mineria</a>
                    </div>
                </div>
            </div>

            <!-- Search icon — mobile only -->
            <button class="lt-header-btn lt-mobile-search-btn" id="mobileSearchBtn" aria-label="Buscar">
                <i class="fas fa-search"></i>
            </button>

            <!-- Notifications -->
            <button class="lt-header-btn" id="notificationsBtn" aria-label="Notificaciones">
                <i class="fas fa-bell"></i>
                <span class="lt-badge" id="notifBadge"></span>
            </button>

            <!-- Profile -->
            <button class="lt-header-btn lt-profile-btn" id="profileBtn" aria-label="Perfil">
                <img class="lt-header-avatar" id="headerAvatar" src="" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="lt-header-avatar-fallback" id="headerAvatarFallback"><i class="fas fa-user"></i></span>
            </button>
        </div>
    </div>
</header>

<!-- Fullscreen search modal (mobile) -->
<div class="lt-search-modal" id="searchModal">
    <div class="lt-sm-header">
        <button class="lt-sm-back" id="searchModalClose"><i class="fas fa-arrow-left"></i></button>
        <input type="text" class="lt-sm-input" id="searchModalInput" placeholder="Buscar en La Tanda..." autocomplete="off" enterkeyhint="search">
    </div>
    <div class="lt-sm-results" id="searchModalResults">
        <div class="lt-sm-hint">Busca personas, grupos, publicaciones...</div>
    </div>
</div>
