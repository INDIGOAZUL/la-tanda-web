<!DOCTYPE html>
<html>
<head>
    <title>Email Templates</title>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 40px; }
        .template { background: #1e293b; padding: 20px; margin: 20px 0; border-radius: 8px; }
        h2 { color: #00d4aa; }
    </style>
</head>
<body>
    <h1>📧 Email Templates</h1>
    
    <div class="template">
        <h2>Bienvenido a La Tanda</h2>
        <p>¡Gracias por registrarte! Empieza a ahorrar con tu comunidad.</p>
    </div>
    
    <div class="template">
        <h2>Confirmación de Pago</h2>
        <p>Tu pago de L.XXX ha sido confirmado. Gracias por tu compromiso.</p>
    </div>
    
    <div class="template">
        <h2>Nuevo Miembro</h2>
        <p>Un nuevo miembro se ha unido a tu tanda. ¡Bienvenido!</p>
    </div>
</body>
</html>
