<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Predictor La Tanda — Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard-layout.css?v=7.0">
    <link rel="stylesheet" href="css/hub/social-feed.css?v=13.7">
    <style>
        :root {
            --bg-primary: var(--ds-bg-base, #0f172a);
            --bg-card: var(--ds-bg-base, #1e293b);
            --bg-card-hover: #263348;
            --text-primary: var(--ds-text-primary, #e2e8f0);
            --text-secondary: var(--ds-text-secondary, #94a3b8);
            --text-muted: var(--ds-text-muted, #64748b);
            --accent: var(--ds-purple, #ec4899);
            --accent-glow: var(--ds-purple-muted, rgba(236,72,153,0.2));
            --gold: var(--ds-amber, #f59e0b);
            --green: var(--ds-green, #10b981);
            --cyan: var(--ds-cyan, #06b6d4);
            --border: var(--ds-glass-border, rgba(255,255,255,0.08));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }
        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 20%, rgba(236,72,153,0.06) 0%, transparent 50%), radial-gradient(circle at 70% 80%, var(--ds-cyan-muted, rgba(6,182,212,0.05)) 0%, transparent 50%); z-index: 0; pointer-events: none; }

        .pp-container { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; position: relative; z-index: 1; }

        /* Header / Avatar */
        .pp-header { text-align: center; padding: 30px 0 20px; }
        .pp-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--cyan)); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 2.5rem; box-shadow: 0 0 30px var(--accent-glow); }
        .pp-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .pp-handle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
        .pp-bio { color: var(--text-secondary); font-size: 0.88rem; max-width: 500px; margin: 0 auto 12px; line-height: 1.5; }
        .pp-badge { display: inline-block; background: rgba(236,72,153,0.15); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
        .pp-badge i { margin-right: 4px; }

        /* Stats Grid */
        .pp-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .pp-stat { background: var(--bg-card); border-radius: 12px; padding: 14px 10px; text-align: center; border: 1px solid var(--border); }
        .pp-stat-value { font-size: 1.3rem; font-weight: 700; }
        .pp-stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
        .pp-stat-value.gold { color: var(--gold); }
        .pp-stat-value.green { color: var(--green); }
        .pp-stat-value.cyan { color: var(--cyan); }
        .pp-stat-value.pink { color: var(--accent); }

        /* Accuracy Section */
        .pp-section { background: var(--bg-card); border-radius: 14px; padding: 18px; margin-bottom: 16px; border: 1px solid var(--border); }
        .pp-section-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .pp-section-title i { color: var(--accent); }

        .pp-accuracy-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .pp-accuracy-row:last-child { border-bottom: none; }
        .pp-acc-label { font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
        .pp-acc-label i { width: 20px; text-align: center; }
        .pp-acc-value { font-weight: 600; font-size: 0.9rem; }
        .pp-acc-bar { flex: 1; height: 6px; background: var(--ds-border, rgba(255,255,255,0.06)); border-radius: 3px; margin: 0 12px; max-width: 200px; }
        .pp-acc-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .pp-acc-fill.pink { background: var(--accent); }
        .pp-acc-fill.gold { background: var(--gold); }
        .pp-acc-fill.green { background: var(--green); }
        .pp-acc-fill.cyan { background: var(--cyan); }

        /* vs Random badges */
        .pp-vs-random { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .pp-vs-badge { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: var(--green); padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; }
        .pp-vs-badge.neutral { background: rgba(100,116,139,0.1); border-color: rgba(100,116,139,0.2); color: var(--text-muted); }

        /* Recent Hits */
        .pp-hit-card { background: var(--bg-card-hover); border-radius: 10px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); display: flex; align-items: center; gap: 12px; }
        .pp-hit-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(245,158,11,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--gold); flex-shrink: 0; }
        .pp-hit-info { flex: 1; }
        .pp-hit-title { font-size: 0.85rem; font-weight: 600; }
        .pp-hit-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        /* Recent Predictions */
        .pp-pred-card { background: var(--bg-card-hover); border-radius: 10px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .pp-pred-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
        .pp-pred-numbers { display: flex; gap: 6px; flex-wrap: wrap; }
        .pp-pred-num { background: rgba(236,72,153,0.12); color: var(--accent); padding: 3px 8px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; font-family: 'Fira Code', monospace; }
        .pp-pred-time { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
        .pp-pred-hot { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .pp-pred-hot-num { background: rgba(245,158,11,0.12); color: var(--gold); padding: 3px 8px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; }

        /* Algorithm info */
        .pp-algo { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pp-algo-item { background: var(--bg-card-hover); border-radius: 8px; padding: 10px; }
        .pp-algo-label { font-size: 0.72rem; color: var(--text-muted); }
        .pp-algo-value { font-size: 0.85rem; font-weight: 600; margin-top: 2px; }

        /* Empty state */
        .pp-empty { text-align: center; padding: 30px; color: var(--text-muted); }
        .pp-empty i { font-size: 2rem; margin-bottom: 8px; display: block; }

        /* Loading */
        .pp-loading { text-align: center; padding: 60px 0; color: var(--text-muted); }
        .pp-loading i { font-size: 2rem; animation: spin 1s linear infinite; display: block; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Back button */
        .pp-back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; padding: 8px 0; margin-bottom: 10px; }
        .pp-back:hover { color: var(--text-primary); }

        /* Responsive */
        @media (max-width: 480px) {
            .pp-stats { grid-template-columns: repeat(2, 1fr); }
            .pp-algo { grid-template-columns: 1fr; }
            .pp-accuracy-row { flex-wrap: wrap; gap: 6px; }
            .pp-acc-bar { max-width: 100%; order: 3; flex-basis: 100%; }
        }
    </style>
</head>
<body>
    <div class="pp-container">
        <a href="/home-dashboard.html" class="pp-back"><i class="fas fa-arrow-left"></i> Volver al feed</a>

        <div id="ppContent">
            <div class="pp-loading"><i class="fas fa-spinner"></i>Cargando perfil del predictor...</div>
        </div>
    </div>

    <script>
    (function() {
        const API = '';

        async function loadProfile() {
            try {
                const resp = await fetch(API + '/api/lottery/predictor-stats');
                const json = await resp.json();
                if (!json.success) throw new Error(json.message || 'Error');
                renderProfile(json.data);
            } catch (e) {
                document.getElementById('ppContent').innerHTML =
                    '<div class="pp-empty"><i class="fas fa-exclamation-circle"></i>Error cargando perfil</div>';
            }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const now = new Date();
            const days = Math.floor((now - d) / 86400000);
            if (days === 0) return 'Hoy';
            if (days === 1) return 'Ayer';
            if (days < 7) return 'Hace ' + days + ' dias';
            return d.toLocaleDateString('es-HN', { day: 'numeric', month: 'short' });
        }

        function renderProfile(d) {
            let html = '';

            // Header
            html += '<div class="pp-header">';
            html += '<div class="pp-avatar">\ud83c\udfb1</div>';
            html += '<div class="pp-name">' + esc(d.name) + '</div>';
            html += '<div class="pp-handle">@predictor_latanda</div>';
            html += '<div class="pp-bio">Predicciones diarias de La Diaria Honduras usando analisis EWMA, cadenas de Markov, CUSUM y sistema de jaladores. Publicaciones automaticas cada manana.</div>';
            html += '<span class="pp-badge"><i class="fas fa-robot"></i> Bot Automatizado \u2022 Algoritmo ' + esc(d.algorithm) + '</span>';
            html += '</div>';

            // Stats
            html += '<div class="pp-stats">';
            html += '<div class="pp-stat"><div class="pp-stat-value cyan">' + d.ageDays + '</div><div class="pp-stat-label">Dias activo</div></div>';
            html += '<div class="pp-stat"><div class="pp-stat-value pink">' + d.totalPosts + '</div><div class="pp-stat-label">Publicaciones</div></div>';
            html += '<div class="pp-stat"><div class="pp-stat-value gold">' + d.totalHits + '</div><div class="pp-stat-label">Aciertos</div></div>';
            html += '<div class="pp-stat"><div class="pp-stat-value green">' + d.accuracy.overall + '%</div><div class="pp-stat-label">Efectividad</div></div>';
            html += '</div>';

            // Accuracy breakdown
            html += '<div class="pp-section">';
            html += '<div class="pp-section-title"><i class="fas fa-chart-bar"></i> Precision por tipo</div>';

            const accTypes = [
                { label: 'Exactos', icon: 'fa-bullseye', value: d.accuracy.exact, color: 'pink', count: d.hits.exact },
                { label: 'Jaladores', icon: 'fa-link', value: d.accuracy.jalador, color: 'gold', count: d.hits.jalador },
                { label: 'Calientes', icon: 'fa-fire', value: d.accuracy.hot, color: 'green', count: d.hits.hot },
            ];

            accTypes.forEach(a => {
                const barWidth = Math.min(a.value * 3, 100); // Scale for visual
                html += '<div class="pp-accuracy-row">';
                html += '<div class="pp-acc-label"><i class="fas ' + a.icon + '"></i>' + a.label + ' (' + a.count + ')</div>';
                html += '<div class="pp-acc-bar"><div class="pp-acc-fill ' + a.color + '" style="width:' + barWidth + '%"></div></div>';
                html += '<div class="pp-acc-value">' + a.value + '%</div>';
                html += '</div>';
            });

            html += '<div class="pp-accuracy-row">';
            html += '<div class="pp-acc-label"><i class="fas fa-ghost"></i>Casi aciertos (\u00b11)</div>';
            html += '<div style="flex:1"></div>';
            html += '<div class="pp-acc-value" style="color:var(--text-muted)">' + d.accuracy.nearMisses + '</div>';
            html += '</div>';

            // vs Random
            html += '<div class="pp-vs-random">';
            const vsItems = [
                { label: 'Exactos vs Azar', val: d.vsRandom.exact },
                { label: 'Jaladores vs Azar', val: d.vsRandom.jalador },
                { label: 'General vs Azar', val: d.vsRandom.overall }
            ];
            vsItems.forEach(v => {
                const num = parseFloat(v.val);
                const cls = num > 1 ? '' : 'neutral';
                html += '<div class="pp-vs-badge ' + cls + '">' + v.label + ': ' + v.val + '</div>';
            });
            html += '</div>';
            html += '</div>';

            // Streak
            if (d.streak > 0) {
                html += '<div class="pp-section" style="border-left:3px solid var(--gold);text-align:center;">';
                html += '<div style="font-size:1.5rem;margin-bottom:4px">\ud83d\udd25</div>';
                html += '<div style="font-size:1.1rem;font-weight:700;color:var(--gold)">' + d.streak + ' dias consecutivos con acierto</div>';
                html += '</div>';
            }

            // Recent Hits
            html += '<div class="pp-section">';
            html += '<div class="pp-section-title"><i class="fas fa-trophy"></i> Aciertos recientes</div>';
            if (d.recentHits.length === 0) {
                html += '<div class="pp-empty" style="padding:20px"><i class="fas fa-clock" style="font-size:1.5rem"></i>Los aciertos apareceran aqui automaticamente</div>';
            } else {
                d.recentHits.forEach(h => {
                    const icons = { exact: 'fa-bullseye', jalador: 'fa-link', hot: 'fa-fire', near: 'fa-ghost' };
                    html += '<div class="pp-hit-card">';
                    html += '<div class="pp-hit-icon"><i class="fas ' + (icons[h.hitType] || 'fa-star') + '"></i></div>';
                    html += '<div class="pp-hit-info">';
                    html += '<div class="pp-hit-title">' + (h.number ? h.number.toString().padStart(2, '0') : '??') + ' (' + esc(h.sign || '') + ') \u2014 ' + esc(h.drawTime || '') + '</div>';
                    html += '<div class="pp-hit-meta">' + timeAgo(h.date) + '</div>';
                    html += '</div></div>';
                });
            }
            html += '</div>';

            // Recent Predictions
            html += '<div class="pp-section">';
            html += '<div class="pp-section-title"><i class="fas fa-crystal-ball"></i> Predicciones recientes</div>';
            d.recentPredictions.forEach(p => {
                html += '<div class="pp-pred-card">';
                html += '<div class="pp-pred-title">' + esc(p.title) + '</div>';
                if (p.hotNumbers && p.hotNumbers.length > 0) {
                    html += '<div class="pp-pred-time">\ud83d\udd25 Numeros Calientes:</div>';
                    html += '<div class="pp-pred-hot">';
                    p.hotNumbers.forEach(h => {
                        html += '<span class="pp-pred-hot-num">' + h.number.toString().padStart(2, '0') + ' ' + esc(h.sign) + '</span>';
                    });
                    html += '</div>';
                }
                p.predictions.forEach(pr => {
                    html += '<div class="pp-pred-time">\u23f0 ' + esc(pr.drawTime) + ':</div>';
                    html += '<div class="pp-pred-numbers">';
                    pr.numbers.forEach(n => {
                        html += '<span class="pp-pred-num">' + n + '</span>';
                    });
                    html += '</div>';
                });
                html += '<div class="pp-hit-meta">' + timeAgo(p.date) + '</div>';
                html += '</div>';
            });
            html += '</div>';

            // Algorithm info
            html += '<div class="pp-section">';
            html += '<div class="pp-section-title"><i class="fas fa-microchip"></i> Algoritmo</div>';
            html += '<div class="pp-algo">';
            html += '<div class="pp-algo-item"><div class="pp-algo-label">Version</div><div class="pp-algo-value">' + esc(d.algorithm) + '</div></div>';
            html += '<div class="pp-algo-item"><div class="pp-algo-label">Metodo</div><div class="pp-algo-value" style="font-size:0.75rem">' + esc(d.methodology) + '</div></div>';
            html += '<div class="pp-algo-item"><div class="pp-algo-label">Predicciones totales</div><div class="pp-algo-value">' + d.totalPredictions.toLocaleString() + '</div></div>';
            html += '<div class="pp-algo-item"><div class="pp-algo-label">Sorteos analizados</div><div class="pp-algo-value">' + d.totalDraws.toLocaleString() + '</div></div>';
            html += '</div>';
            html += '</div>';

            // Data source
            html += '<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:0.75rem;">';
            html += 'Datos: kiskooloterias.com \u2022 Resultados: La Diaria Honduras \u2022 Publicacion diaria 10:15 AM';
            html += '</div>';

            document.getElementById('ppContent').innerHTML = html;
        }

        loadProfile();
    })();
    </script>
</body>
</html>
