<!-- PATCH: Accessibility fixes — manual review recommended before merge -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Tanda - Mercado Social</title>
  <style>
    body { font-family: sans-serif; color: #333; background: #fff; }
    .feed-item { border-bottom: 1px solid #eee; padding: 12px; }
    .like-btn { background: transparent; border: 1px solid #ccc; padding: 6px 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .like-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link" style="position:absolute;top:-40px;left:0;background:#000;color:#fff;padding:8px;z-index:100;transition:top 0.3s;">Saltar al contenido principal</a>
  <main id="main-content">
    <h1>Mercado Social</h1>
    <div class="feed">
      <article class="feed-item">
        <img src="user1.jpg" alt="Usuario Juan Perez">
        <p>Compartio un nuevo producto</p>
        <button class="like-btn" aria-label="Me gusta" data-action="like">
          <i class="fa fa-heart"></i> Me gusta
        </button>
      </article>
      <article class="feed-item">
        <img src="producto.jpg" alt="Imagen del producto">
        <p>Producto en venta</p>
        <button class="like-btn" aria-label="Me gusta" data-action="like">
          <i class="fa fa-heart"></i> Me gusta
        </button>
      </article>
    </div>
  </main>
</body>
</html>
