<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Grupo - La Tanda</title>
    <meta name="description" content="Panel de gestion de grupo - La Tanda">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
.gm-stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.gm-stat-card { background: var(--ds-bg-elevated, rgba(255,255,255,0.04)); border: 1px solid var(--ds-border, rgba(255,255,255,0.08)); border-radius: 8px; padding: 10px 8px; text-align: center; }
.gm-stat-val { display: block; font-size: 1.1rem; font-weight: 700; color: var(--ds-text-primary, #e2e8f0); }
.gm-stat-label { font-size: 0.68rem; color: var(--ds-text-muted, #64748b); text-transform: uppercase; letter-spacing: 0.5px; }
.gm-print-icon { background: none; border: 1px solid var(--ds-border, rgba(255,255,255,0.1)); color: var(--ds-text-muted, #64748b); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.82rem; transition: color 0.2s, border-color 0.2s; }
.gm-print-icon:hover { color: var(--ds-cyan, #00FFFF); border-color: rgba(0,255,255,0.3); }
@media (max-width: 480px) { .gm-stat-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
<link rel="stylesheet" href="css/gestionar.css?v=1.2">
    <style>
        :root {
            --tanda-cyan: var(--ds-cyan, #00FFFF);
            --bg-primary: var(--ds-bg-base, #0f172a);
            --bg-secondary: #1e293b;
            --text-primary: var(--ds-text-primary, #f8fafc);
            --text-secondary: var(--ds-text-secondary, #e2e8f0);
            --text-muted: var(--ds-text-muted, #94a3b8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 25% 25%, rgba(0,255,255,0.08) 0%, transparent 70%),
                        radial-gradient(circle at 75% 75%, rgba(127,255,216,0.04) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="gm-header">
    <div class="gm-header-left">
        <a href="/groups-advanced-system.html" class="gm-back-btn" title="Volver a Grupos">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="gm-header-info">
            <h1 id="gmGroupName" class="gm-group-name">Cargando...</h1>
            <div class="gm-header-meta">
                <span id="gmRoleBadge" class="gm-role-badge">Coordinador</span>
                <span id="gmHealthBadge" class="gm-health-badge" style="display:none;"></span>
            </div>
        </div>
    </div>
</header>

<!-- Summary Cards -->
<div class="gm-summary" id="gmSummary">
    <div class="gm-stat-card">
        <div class="gm-stat-value" id="gmStatCycle">--</div>
        <div class="gm-stat-label">Ciclo</div>
    </div>
    <div class="gm-stat-card">
        <div class="gm-stat-value" id="gmStatMembers">--</div>
        <div class="gm-stat-label">Miembros</div>
    </div>
    <div class="gm-stat-card">
        <div class="gm-stat-value" id="gmStatCollected">--</div>
        <div class="gm-stat-label">Recaudado</div>
    </div>
    <div class="gm-stat-card">
        <div class="gm-stat-value" id="gmStatCompliance">--</div>
        <div class="gm-stat-label">Cumplimiento</div>
    </div>
</div>

<!-- Tabs -->
<nav class="gm-tabs" id="gmTabs">
    <button class="gm-tab active" data-tab="resumen"><i class="fas fa-home"></i> Resumen</button>
    <button class="gm-tab" data-tab="pagos"><i class="fas fa-credit-card"></i> Pagos</button>
    <button class="gm-tab" data-tab="miembros"><i class="fas fa-users"></i> Miembros</button>
    <button class="gm-tab" data-tab="finanzas"><i class="fas fa-chart-line"></i> Finanzas</button>
    <button class="gm-tab" data-tab="config"><i class="fas fa-cog"></i> Config</button>
</nav>

<!-- Tab Content -->
<main class="gm-main">
    <!-- Resumen -->
    <div class="gm-panel active" id="panel-resumen">
        <div id="resumenContent"><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando resumen...</div></div>
    </div>
    <!-- Pagos -->
    <div class="gm-panel" id="panel-pagos">
        <div id="pagosContent"><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div></div>
    </div>
    <!-- Miembros -->
    <div class="gm-panel" id="panel-miembros">
        <div id="miembrosContent"><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div></div>
    </div>
    <!-- Finanzas -->
    <div class="gm-panel" id="panel-finanzas">
        <div id="finanzasContent"><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div></div>
    </div>
    <!-- Config -->
    <div class="gm-panel" id="panel-config">
        <div id="configContent"><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div></div>
    </div>
</main>

<!-- Confirm Modal (reusable) -->
<div class="gm-confirm-overlay" id="gmConfirmOverlay" style="display:none;">
    <div class="gm-confirm-box">
        <p id="gmConfirmMsg"></p>
        <div class="gm-confirm-actions">
            <button class="ds-btn ds-btn-secondary" id="gmConfirmCancel">Cancelar</button>
            <button class="ds-btn ds-btn-primary" id="gmConfirmOk">Confirmar</button>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // === Auth & Config ===
    var API_BASE = window.location.origin;
    var token = localStorage.getItem('auth_token') || localStorage.getItem('authToken');
    if (!token) { window.location.href = '/auth-enhanced.html'; return; }

    var params = new URLSearchParams(window.location.search);
    var groupId = params.get('groupId');
    // Also parse from URL path: /gestionar/:groupId
    if (!groupId) {
        var pathMatch = window.location.pathname.match(/\/gestionar\/([^/]+)/);
        if (pathMatch) groupId = decodeURIComponent(pathMatch[1]);
    }
    if (!groupId) { window.location.href = '/groups-advanced-system.html'; return; }

    var groupData = null;
    var isReadOnly = false;
    var statsData = null;
    var userRole = null;
    var currentTab = 'resumen';
    var tabLoaded = {};

    // === Helpers ===
    function authHeaders() { return { 'Authorization': 'Bearer ' + token }; }
    function jsonHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmt(n) { return parseFloat(n || 0).toLocaleString('es-HN', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
    function pct(n) { return (n || 0) + '%'; }
    function rateColor(v) { return v >= 80 ? 'var(--ds-green)' : v >= 50 ? 'var(--ds-amber)' : 'var(--ds-red)'; }

    function showToast(msg, type) {
        var t = document.createElement('div');
        t.className = 'gm-toast gm-toast-' + (type || 'info');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function() { t.classList.add('show'); }, 10);
        setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 300); }, 3000);
    }

    function showConfirm(msg) {
        return new Promise(function(resolve) {
            var ov = document.getElementById('gmConfirmOverlay');
            document.getElementById('gmConfirmMsg').textContent = msg;
            ov.style.display = 'flex';
            document.getElementById('gmConfirmOk').onclick = function() { ov.style.display = 'none'; resolve(true); };
            document.getElementById('gmConfirmCancel').onclick = function() { ov.style.display = 'none'; resolve(false); };
            ov.onclick = function(e) { if (e.target === ov) { ov.style.display = 'none'; resolve(false); } };
        });
    }

    var vpMethodLabels = {
        'cash': 'Efectivo', 'bank_transfer': 'Transferencia', 'tigo_money': 'Tigo Money',
        'card': 'Tarjeta', 'wallet': 'Wallet LTD', 'crypto': 'Crypto', 'deposit': 'Deposito',
        'coordinator_manual': 'Registrado por coordinador', 'coordinator_bulk': 'Pago masivo',
        'distribution_retention': 'Retencion de distribucion'
    };

    // === Init: Load group data ===
    async function init() {
        try {
            // Stats endpoint already returns my_role — no need for separate /members call
            var [statsRes, healthRes] = await Promise.all([
                fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/stats', { headers: authHeaders() }),
                fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/health', { headers: authHeaders() }).catch(function() { return null; })
            ]);
            var statsJson = await statsRes.json();

            if (!statsRes.ok || !statsJson.success) throw new Error('No se pudo cargar el grupo');

            statsData = statsJson.data;
            var sg = statsData.group || {};
            var sm = statsData.members || {};
            var sp = statsData.payments || {};

            // Role comes directly from stats endpoint
            userRole = statsData.my_role || 'member';

            // v4.25.12: Members can access in read-only mode
            isReadOnly = (userRole !== 'coordinator' && userRole !== 'creator' && userRole !== 'admin');
            if (isReadOnly) {
                // Check they are at least a member
                if (!statsData.my_role || statsData.my_role === 'open') {
                    showToast('No tienes acceso a este grupo', 'error');
                    setTimeout(function() { window.location.href = '/groups-advanced-system.html'; }, 1500);
                    return;
                }
            }

            // Health score from separate endpoint
            var healthScore = null;
            try {
                if (healthRes) {
                    var hJson = await healthRes.json();
                    if (hJson.success) healthScore = hJson.data.score;
                }
            } catch(e) {}

            // Store group data
            groupData = {
                id: groupId,
                name: sg.name || 'Grupo',
                current_cycle: sg.current_cycle || 0,
                max_members: sg.max_members || 0,
                health_score: healthScore,
                frequency: sg.frequency,
                contribution_amount: sg.contribution_amount,
                commission_rate: sg.commission_rate,
                distribution_mode: sg.distribution_mode || 'rotation',
                pool_balance: sg.pool_balance || 0,
                total_shares: sg.total_shares || 0,
                nav_per_share: sg.nav_per_share || 100,
                min_contribution: sg.min_contribution,
                max_contribution: sg.max_contribution,
                total_cycles: sg.total_cycles
            };

            // Update header
            document.getElementById('gmGroupName').textContent = groupData.name;
            document.getElementById('gmRoleBadge').textContent = userRole === 'creator' ? 'Creador' : userRole === 'coordinator' ? 'Coordinador' : 'Miembro';

            // v4.25.12: Show distribution mode badge
            var modeNames = { rotation: 'Tanda', lottery: 'Loteria', accumulate: 'Ahorro', shares: 'Inversion', request: 'Fondo' };
            var modeName = modeNames[groupData.distribution_mode] || '';
            if (modeName && groupData.distribution_mode !== 'rotation') {
                var mb = document.createElement('span');
                mb.className = 'gm-mode-badge';
                mb.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:8px;font-size:0.7rem;font-weight:600;background:var(--ds-purple,#a855f7);color:#fff;margin-left:6px;';
                mb.textContent = modeName;
                document.getElementById('gmRoleBadge').after(mb);
            }

            if (healthScore != null) {
                var hb = document.getElementById('gmHealthBadge');
                var hColor = healthScore >= 80 ? 'var(--ds-green)' : healthScore >= 60 ? 'var(--ds-amber)' : 'var(--ds-red)';
                hb.innerHTML = '<i class="fas fa-heartbeat"></i> ' + healthScore;
                hb.style.color = hColor;
                hb.style.borderColor = hColor;
                hb.style.display = 'inline-flex';
            }

            // v4.25.12: Adapt tabs visibility based on distribution_mode
            var dm = groupData.distribution_mode;

            // v4.25.12: Hide admin-only tabs for read-only members
            if (isReadOnly) {
                var tabConfig = document.querySelector('.gm-tab[data-tab="config"]');
                if (tabConfig) tabConfig.style.display = 'none';
                // Rename Pagos to "Mi Pago" for members
                var tabPagos = document.querySelector('.gm-tab[data-tab="pagos"]');
                if (tabPagos) tabPagos.innerHTML = '<i class="fas fa-receipt"></i> Mi Info';
            }
            var tabPagos = document.querySelector('.gm-tab[data-tab="pagos"]');
            var tabFinanzas = document.querySelector('.gm-tab[data-tab="finanzas"]');

            if (dm === 'accumulate') {
                // Savings: rename Pagos to "Contribuciones", hide Finanzas turnos
                if (tabPagos) tabPagos.innerHTML = '<i class="fas fa-piggy-bank"></i> Aportes';
            } else if (dm === 'shares') {
                // Investment: rename Pagos to "Inversiones"
                if (tabPagos) tabPagos.innerHTML = '<i class="fas fa-chart-line"></i> Inversiones';
            } else if (dm === 'request') {
                // Community: rename Pagos to "Aportes", add Solicitudes indicator
                if (tabPagos) tabPagos.innerHTML = '<i class="fas fa-hands-helping"></i> Aportes';
            } else if (dm === 'lottery') {
                // Lottery: same as rotation but distribution shows "Sorteo"
            }

            // Update summary cards
            // Ciclo: current cycle number
            document.getElementById('gmStatCycle').textContent = sg.current_cycle || 0;

            // v4.25.12: Pool balance for accumulating modes
            if (dm === 'accumulate' || dm === 'shares' || dm === 'request') {
                var poolEl = document.getElementById('gmStatCycle');
                var poolLbl = poolEl.parentElement.querySelector('.gm-stat-label');
                if (dm === 'shares') {
                    poolEl.textContent = 'L.' + (groupData.pool_balance || 0).toLocaleString('es-HN', {maximumFractionDigits:0});
                    poolLbl.textContent = 'Pool (NAV: L.' + (groupData.nav_per_share || 100) + ')';
                } else {
                    poolEl.textContent = 'L.' + (groupData.pool_balance || 0).toLocaleString('es-HN', {maximumFractionDigits:0});
                    poolLbl.textContent = dm === 'request' ? 'Fondo Disponible' : 'Pool de Ahorro';
                }
            }
            document.getElementById('gmStatCycle').parentElement.querySelector('.gm-stat-label').textContent = 'Ciclo de ' + (sg.max_members || '?');

            // Miembros: active / max
            document.getElementById('gmStatMembers').textContent = (sm.active || sm.total || 0) + '/' + (sg.max_members || '?');

            // Recaudado: show total collected (all cycles)
            document.getElementById('gmStatCollected').textContent = 'L. ' + fmt(sp.total_collected);

            // v4.25.4: Use API completion_rate directly (total_collected / expectedTotal)
            // Old formula completed/(completed+pending) was broken — pending is always ~0
            var compRate = sp.completion_rate || 0;
            var compEl = document.getElementById('gmStatCompliance');
            compEl.textContent = pct(compRate);
            compEl.style.color = rateColor(compRate);

            // Load initial tab
            loadTab('resumen');

        } catch (err) {
            document.getElementById('resumenContent').innerHTML = '<div class="gm-error"><i class="fas fa-exclamation-triangle"></i> ' + esc(err.message) + '</div>';
        }
    }

    // === Tab Switching ===
    document.getElementById('gmTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.gm-tab');
        if (!tab) return;
        var tabName = tab.getAttribute('data-tab');
        if (tabName === currentTab) return;

        document.querySelectorAll('.gm-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        document.querySelectorAll('.gm-panel').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById('panel-' + tabName).classList.add('active');
        currentTab = tabName;
        loadTab(tabName);
    });

    function loadTab(name) {
        switch(name) {
            case 'resumen': loadResumen(); break;
            case 'pagos': loadPagos(); break;
            case 'miembros': loadMiembros(); break;
            case 'finanzas': loadFinanzas(); break;
            case 'config': loadConfig(); break;
        }
    }

    // ╔══════════════════════════════════════════════════╗
    // ║  TAB: RESUMEN                                    ║
    // ╚══════════════════════════════════════════════════╝
    var resumenLoaded = false;
    function loadResumen(force) {
        if (resumenLoaded && !force) return;
        resumenLoaded = true;
        var sp = statsData ? statsData.payments || {} : {};
        var sg = statsData ? statsData.group || {} : {};
        var html = '';

        // Alerts
        if (sp.pending > 0) {
            html += '<div class="gm-alert gm-alert-warn"><i class="fas fa-exclamation-triangle"></i> ' + sp.pending + ' pago(s) pendiente(s) de verificacion — <button type="button" class="gm-alert-link" data-action="go-pagos-verificar" style="color:inherit;font-weight:600;background:none;border:none;padding:0;cursor:pointer;">Verificar</button></div>';
        }

        // Overview stats
        var cycle = sg.current_cycle || groupData.current_cycle || '?';
        var totalMembers = sg.total_members || groupData.max_members || '?';
        var activeMembers = sg.active_members || totalMembers;
        var contrib = parseFloat(sg.contribution_amount || groupData.contribution_amount || 0);
        var pool = contrib * (parseInt(totalMembers) || 0);
        html += '<div class="gm-section">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="gm-section-title" style="margin:0;">Resumen</div><button class="gm-print-icon" data-action="print-resumen" title="Imprimir reporte"><i class="fas fa-print"></i></button></div>';
        html += '<div class="gm-stat-grid">';
        html += '<div class="gm-stat-card"><span class="gm-stat-val" style="color:var(--ds-cyan);">' + cycle + '</span><span class="gm-stat-label">Ciclo</span></div>';
        html += '<div class="gm-stat-card"><span class="gm-stat-val">' + activeMembers + '/' + totalMembers + '</span><span class="gm-stat-label">Posiciones</span></div>';
        html += '<div class="gm-stat-card"><span class="gm-stat-val" style="color:var(--ds-green);">L.' + contrib.toLocaleString('es-HN') + '</span><span class="gm-stat-label">Aporte</span></div>';
        html += '<div class="gm-stat-card"><span class="gm-stat-val" style="color:var(--ds-amber);">L.' + pool.toLocaleString('es-HN') + '</span><span class="gm-stat-label">Pool</span></div>';
        html += '</div></div>';

        // Health sparkline
        html += '<div class="gm-section"><div class="gm-section-title">Salud del Grupo</div>';
        html += '<div id="resumenHealth"><div class="gm-loading-sm"><i class="fas fa-spinner fa-spin"></i></div></div>';
        html += '</div>';

        // Recent activity placeholder
        html += '<div class="gm-section"><div class="gm-section-title">Estado del Ciclo Actual</div>';
        html += '<div id="resumenActivity"><div class="gm-loading-sm"><i class="fas fa-spinner fa-spin"></i></div></div>';
        html += '</div>';

        document.getElementById('resumenContent').innerHTML = html;
        loadResumenHealth();
        loadResumenActivity();
    }

    // v4.25.4: Print Resumen report
    function printResumen() {
        var groupName = esc(groupData.name || 'Grupo');
        var cycleText = 'Ciclo ' + (groupData.current_cycle || '?');
        var contentEl = document.getElementById('resumenContent');
        if (!contentEl) return;

        var pw = window.open('', '_blank', 'width=800,height=700');
        pw.document.write('<html><head><title>' + groupName + ' - Resumen</title>');
        pw.document.write('<style>');
        pw.document.write('body{font-family:Inter,Arial,sans-serif;padding:24px;color:#1e293b;max-width:720px;margin:0 auto;}');
        pw.document.write('h1{font-size:18px;margin-bottom:2px;}h2{font-size:13px;color:#64748b;font-weight:normal;margin-bottom:16px;}');
        pw.document.write('.ds-card{border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:10px;}');
        pw.document.write('.gm-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;}');
        pw.document.write('.gm-bar-fill{height:100%;border-radius:4px;}');
        pw.document.write('.gm-factor{margin-bottom:8px;}.gm-factor-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}');
        pw.document.write('.gm-section-title{font-size:13px;font-weight:600;margin-bottom:6px;color:#334155;}');
        pw.document.write('.gm-alert{padding:10px;border-radius:6px;margin-bottom:10px;font-size:13px;}');
        pw.document.write('.gm-alert-warn{background:#fff8e1;border-left:3px solid #f59e0b;color:#92400e;}');
        pw.document.write('.gm-actions-grid{display:none;}');  // hide action buttons in print
        pw.document.write('.gm-activity-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}');
        pw.document.write('.gm-activity-name{font-weight:500;}');
        pw.document.write('.gm-activity-date{margin-left:auto;font-size:11px;color:#94a3b8;}');
        pw.document.write('.gm-badge-count{display:none;}');
        pw.document.write('svg{max-width:100%;}');
        pw.document.write('@media print{body{padding:12px;}}');
        pw.document.write('</style></head><body>');
        pw.document.write('<h1>' + groupName + '</h1>');
        pw.document.write('<h2>' + cycleText + ' — Reporte generado: ' + new Date().toLocaleDateString('es-HN', {day:'2-digit',month:'long',year:'numeric'}) + '</h2>');
        pw.document.write(contentEl.innerHTML);
        pw.document.write('</body></html>');
        pw.document.close();
        pw.focus();
        setTimeout(function() { pw.print(); }, 350);
    }

    async function loadResumenHealth() {
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/health-history', { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error('');
            var d = data.data;
            var score = d.current_score;
            var cat = score >= 80 ? 'Saludable' : score >= 60 ? 'Estable' : score >= 40 ? 'En Riesgo' : 'Critico';
            var color = score >= 80 ? 'var(--ds-green)' : score >= 60 ? 'var(--ds-amber)' : 'var(--ds-red)';
            var trend = d.trend || 'stable';
            var trendIcon = trend === 'improving' ? 'fa-arrow-up' : trend === 'declining' ? 'fa-arrow-down' : 'fa-minus';
            var trendColor = trend === 'improving' ? 'var(--ds-green)' : trend === 'declining' ? 'var(--ds-red)' : 'var(--ds-text-muted)';

            // Build sparkline SVG
            var history = d.history || [];
            var svgHtml = '';
            if (history.length === 1) {
                svgHtml = '<div style="font-size:0.72rem;color:var(--ds-text-faint);margin-top:8px;"><i class="fas fa-info-circle"></i> Tendencia disponible despues de 2+ dias de datos (' + history.length + ' punto)</div>';
            } else if (history.length > 1) {
                var pts = [];
                var w = 400, h = 50;
                for (var i = 0; i < history.length; i++) {
                    var x = (i / (history.length - 1)) * w;
                    var y = h - (history[i].score / 100) * h;
                    pts.push(x + ',' + y);
                }
                svgHtml = '<svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" height="' + h + '" preserveAspectRatio="none" style="margin-top:8px;"><polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round"/></svg>';
            }

            // Factors
            var factors = d.current_factors || {};
            var factorHtml = '';
            var factorDefs = [
                { key: 'punctuality', label: 'Puntualidad', max: 30 },
                { key: 'moras', label: 'Sin moras', max: 20 },
                { key: 'loans', label: 'Sin prestamos', max: 15 },
                { key: 'suspended', label: 'Sin suspendidos', max: 15 },
                { key: 'maturity', label: 'Madurez', max: 20 }
            ];
            for (var fi = 0; fi < factorDefs.length; fi++) {
                var fd = factorDefs[fi];
                // factors can be {punctuality: 25} (score) or {punctuality: {score: 25, rate: 83}} (object)
                var rawVal = factors[fd.key];
                var fVal = 0;
                if (typeof rawVal === 'number') fVal = rawVal;
                else if (rawVal && typeof rawVal === 'object') fVal = rawVal.score != null ? rawVal.score : 0;
                var fPct = Math.min(100, Math.round((fVal / fd.max) * 100));
                var barColor = fPct >= 70 ? 'var(--ds-green)' : fPct >= 40 ? 'var(--ds-amber)' : 'var(--ds-red)';
                // Detail text from factor metadata
                var detail = '';
                if (rawVal && typeof rawVal === 'object') {
                    if (fd.key === 'punctuality' && rawVal.rate != null) detail = rawVal.rate + '% tasa de pago';
                    else if (fd.key === 'moras' && rawVal.count != null) detail = rawVal.count + ' mora' + (rawVal.count !== 1 ? 's' : '') + ' activa' + (rawVal.count !== 1 ? 's' : '');
                    else if (fd.key === 'loans' && rawVal.count != null) detail = rawVal.count + ' prestamo' + (rawVal.count !== 1 ? 's' : '') + ' activo' + (rawVal.count !== 1 ? 's' : '');
                    else if (fd.key === 'suspended' && rawVal.count != null) detail = rawVal.count + ' suspendido' + (rawVal.count !== 1 ? 's' : '');
                    else if (fd.key === 'maturity' && rawVal.days != null) detail = rawVal.days + ' dias activo';
                }
                factorHtml += '<div class="gm-factor"><div class="gm-factor-head"><span>' + fd.label + '</span><span>' + fVal + '/' + fd.max + '</span></div><div class="gm-bar"><div class="gm-bar-fill" style="width:' + fPct + '%;background:' + barColor + ';"></div></div>' + (detail ? '<div style="font-size:0.68rem;color:var(--ds-text-faint);margin-top:2px;">' + detail + '</div>' : '') + '</div>';
            }

            var cProb = d.completion_probability || 0;
            var h2 = '<div class="ds-card" style="padding:16px;">' +
                '<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">' +
                '<div style="font-size:2rem;font-weight:700;color:' + color + ';">' + score + '<span style="font-size:0.85rem;color:var(--ds-text-faint);">/100</span></div>' +
                '<div><div style="color:var(--ds-text-secondary);font-weight:600;">' + cat + '</div>' +
                '<div style="color:' + trendColor + ';font-size:0.8rem;"><i class="fas ' + trendIcon + '"></i> ' + (trend === 'improving' ? 'Mejorando' : trend === 'declining' ? 'Declinando' : 'Sin cambios') + '</div>' +
                (cProb > 0 ? '<div style="font-size:0.75rem;color:var(--ds-text-muted);margin-top:2px;">' + cProb + '% prob. de completar</div>' : '') +
                '</div></div>' +
                svgHtml + '<div style="margin-top:12px;">' + factorHtml + '</div>' +
                (history.length > 0 ? '<div style="font-size:0.68rem;color:var(--ds-text-faint);margin-top:10px;text-align:right;">Actualizado: ' + new Date(history[history.length - 1].date).toLocaleDateString('es-HN', {day:'numeric',month:'short',year:'numeric'}) + '</div>' : '') +
                '</div>';

            document.getElementById('resumenHealth').innerHTML = h2;
        } catch(e) {
            document.getElementById('resumenHealth').innerHTML = '<div class="gm-empty"><i class="fas fa-exclamation-triangle" style="color:var(--ds-amber);"></i> No disponible<br><button class="ds-btn ds-btn-sm ds-btn-secondary" data-action="retry-health" style="margin-top:8px;">Reintentar</button></div>';
        }
    }

    async function loadResumenActivity() {
        try {
            // payment-status returns per-member status for current cycle
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members/payment-status', { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error('');
            var members = Array.isArray(data.data) ? data.data : (data.data.members || []);
            if (members.length === 0) {
                document.getElementById('resumenActivity').innerHTML = '<div class="gm-empty">Sin datos de miembros</div>';
                return;
            }

            // Count statuses — distinguish paid vs grace (up_to_date)
            var cntPaidCycle = 0, cntGrace = 0, cntPending = 0, cntMora = 0, cntLate = 0, cntSuspended = 0;
            var unpaidNames = [];
            for (var i = 0; i < members.length; i++) {
                var st = members[i].payment_status || members[i].status;
                if (st === 'paid') cntPaidCycle++;
                else if (st === 'up_to_date') { cntGrace++; unpaidNames.push(members[i].name); }
                else if (st === 'mora') { cntMora++; unpaidNames.push(members[i].name); }
                else if (st === 'late' || st === 'overdue') { cntLate++; unpaidNames.push(members[i].name); }
                else if (st === 'suspended') cntSuspended++;
                else { cntPending++; unpaidNames.push(members[i].name); }
            }

            var cycleNum = data.data.cycle_number || groupData.current_cycle || '?';
            var h = '';
            // Progress bar — actual paid only
            var paidPct = members.length > 0 ? Math.round((cntPaidCycle / members.length) * 100) : 0;
            h += '<div class="ds-card" style="padding:14px;margin-bottom:10px;">';
            h += '<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:0.85rem;font-weight:600;">Ciclo ' + cycleNum + '</span><span style="font-weight:700;color:' + rateColor(paidPct) + ';">' + cntPaidCycle + '/' + members.length + ' pagaron</span></div>';
            h += '<div class="gm-bar" style="height:8px;"><div class="gm-bar-fill" style="width:' + paidPct + '%;background:' + rateColor(paidPct) + ';"></div></div>';
            h += '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-size:0.78rem;">';
            if (cntPaidCycle > 0) h += '<span style="color:var(--ds-green);"><i class="fas fa-check-circle"></i> ' + cntPaidCycle + ' pagaron</span>';
            if (cntGrace > 0) h += '<span style="color:var(--ds-green);"><i class="fas fa-check-circle"></i> ' + cntGrace + ' al dia</span>';
            if (cntPending > 0) h += '<span style="color:var(--ds-amber);"><i class="fas fa-clock"></i> ' + cntPending + ' pendientes</span>';
            if (cntMora > 0) h += '<span style="color:var(--ds-red);"><i class="fas fa-exclamation-circle"></i> ' + cntMora + ' en mora</span>';
            if (cntLate > 0) h += '<span style="color:var(--ds-red);"><i class="fas fa-exclamation-triangle"></i> ' + cntLate + ' atrasados</span>';
            if (cntSuspended > 0) h += '<span style="color:var(--ds-text-muted);"><i class="fas fa-ban"></i> ' + cntSuspended + ' suspendidos</span>';
            h += '</div></div>';

            // Who hasn't paid + quick action
            if (unpaidNames.length > 0) {
                h += '<div class="ds-card" style="padding:12px;margin-bottom:10px;border-left:3px solid var(--ds-amber);">';
                h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:0.78rem;font-weight:600;color:var(--ds-amber);">Falta pago (' + unpaidNames.length + ')</span><button class="ds-btn ds-btn-sm ds-btn-primary" data-action="go-pagos-registrar" style="font-size:0.72rem;">Registrar</button></div>';
                if (unpaidNames.length <= 10) {
                    h += '<div style="font-size:0.8rem;color:var(--ds-text-secondary);">' + unpaidNames.map(function(n) { return esc(n); }).join(', ') + '</div>';
                } else {
                    h += '<div style="font-size:0.8rem;color:var(--ds-text-secondary);">' + unpaidNames.slice(0, 8).map(function(n) { return esc(n); }).join(', ') + ' y ' + (unpaidNames.length - 8) + ' mas</div>';
                }
                h += '</div>';
            }

            // Member payment status list — who paid, who hasn't
            var sortedMembers = members.slice().sort(function(a, b) {
                var order = { 'mora': 0, 'late': 1, 'pending': 2, 'up_to_date': 3, 'paid': 4, 'suspended': 5 };
                return (order[a.payment_status] || 3) - (order[b.payment_status] || 3);
            });
            // Only show if there are members with issues (not all paid)
            if (cntPaidCycle < members.length) {
                h += '<div style="margin-top:6px;"><div class="gm-section-title" style="margin-bottom:6px;">Estado por Miembro</div>';
                var statusIcons = { 'paid': '<i class="fas fa-check-circle" style="color:var(--ds-green);"></i>', 'up_to_date': '<i class="fas fa-hourglass-half" style="color:var(--ds-blue,#3b82f6);"></i>', 'mora': '<i class="fas fa-exclamation-circle" style="color:var(--ds-red);"></i>', 'late': '<i class="fas fa-exclamation-triangle" style="color:var(--ds-red);"></i>', 'pending': '<i class="fas fa-clock" style="color:var(--ds-amber);"></i>', 'suspended': '<i class="fas fa-ban" style="color:var(--ds-text-muted);"></i>' };
                var statusTexts = { 'paid': 'Pago', 'up_to_date': 'Al dia', 'mora': 'En mora', 'late': 'Atrasado', 'pending': 'Pendiente', 'suspended': 'Suspendido' };
                for (var mi = 0; mi < sortedMembers.length; mi++) {
                    var sm = sortedMembers[mi];
                    var icon = statusIcons[sm.payment_status] || statusIcons['pending'];
                    var stText = statusTexts[sm.payment_status] || 'Pendiente';
                    h += '<div class="gm-activity-item">' + icon + '<div class="gm-activity-info"><span class="gm-activity-name">' + esc(sm.name || 'Miembro') + '</span></div><div class="gm-activity-date" style="color:var(--ds-text-muted);font-size:0.75rem;">' + stText + '</div></div>';
                }
                h += '</div>';
            }

            document.getElementById('resumenActivity').innerHTML = h;
        } catch(e) {
            document.getElementById('resumenActivity').innerHTML = '<div class="gm-empty"><i class="fas fa-exclamation-triangle" style="color:var(--ds-amber);"></i> Error al cargar estado del ciclo</div>';
        }
    }

        document.getElementById('finanzasContent').innerHTML = html;
    }

    // ╔══════════════════════════════════════════════════╗
    // ║  TAB: CONFIGURACION                              ║
    // ╚══════════════════════════════════════════════════╝
    function loadConfig() {
        var isCreator = userRole === 'creator';
        var sg = statsData ? statsData.group || {} : {};
        var tandaStatus = sg.status || groupData.status || 'active';
        var isPaused = tandaStatus === 'paused';
        var isPublic = groupData.is_public !== false;

        var html = '<div class="gm-section"><div class="gm-section-title">Configuracion</div>';

        html += '<button class="gm-action-btn" data-action="cfg-edit"><i class="fas fa-edit"></i> Editar Grupo</button>';
        html += '<button class="gm-action-btn" data-action="cfg-loan-config"><i class="fas fa-cog"></i> Config Prestamos</button>';
        // M1: Show current pause state
        html += '<button class="gm-action-btn' + (isPaused ? ' gm-action-warn' : '') + '" data-action="cfg-pause"><i class="fas fa-' + (isPaused ? 'play' : 'pause') + '"></i> ' + (isPaused ? 'Reanudar Tanda' : 'Pausar Tanda') + '</button>';
        // M4: Public/private toggle
        html += '<button class="gm-action-btn" data-action="cfg-toggle-public"><i class="fas fa-' + (isPublic ? 'eye' : 'eye-slash') + '"></i> ' + (isPublic ? 'Grupo Publico' : 'Grupo Privado') + '</button>';
        html += '</div></div>';

        html += '<div class="gm-section"><div class="gm-section-title">Exportar</div>';
        html += '<div class="gm-actions-grid">';
        html += '<button class="gm-action-btn" data-action="cfg-export-members-pdf" id="btnExpMPdf"><i class="fas fa-file-pdf" style="color:var(--ds-red);"></i> Miembros PDF</button>';
        html += '<button class="gm-action-btn" data-action="cfg-export-members-csv" id="btnExpMCsv"><i class="fas fa-file-csv" style="color:var(--ds-green);"></i> Miembros CSV</button>';
        html += '<button class="gm-action-btn" data-action="cfg-export-payments-pdf" id="btnExpPPdf"><i class="fas fa-file-pdf" style="color:var(--ds-red);"></i> Pagos PDF</button>';
        html += '<button class="gm-action-btn" data-action="cfg-export-payments-csv" id="btnExpPCsv"><i class="fas fa-file-csv" style="color:var(--ds-green);"></i> Pagos CSV</button>';
        html += '</div></div>';

        if (isCreator) {
            html += '<div class="gm-section"><div class="gm-section-title" style="color:var(--ds-red);">Zona de Peligro</div>';

    // ╔══════════════════════════════════════════════════╗
    // ║  SUB-PANEL RENDERERS                             ║
    // ╚══════════════════════════════════════════════════╝

    // -- Registrar Pago (Individual + Masivo) --
    var cpMembers = [];
    var cpCycleNumber = 0;
    var cpContribAmount = 0;
    var cpSelectedBulk = {};
    var cpActiveTab = 'individual';
    var cpThreshold = (groupData && groupData.advance_threshold) || (statsData && statsData.group && statsData.group.advance_threshold) || 80;

    async function renderRegistrarPago(container) {
        container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Registrar Pagos</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando miembros...</div></div>';

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members/payment-status', { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error('Error al cargar datos');

            cpMembers = data.data.members || [];
            cpCycleNumber = data.data.cycle_number || groupData.current_cycle || 1;
            cpContribAmount = data.data.group_contribution_amount || groupData.contribution_amount || 0;
            cpSelectedBulk = {};

            // Count statuses from actual member data
            var total = cpMembers.length;
            var cntPaid = 0, cntUpToDate = 0, cntPending = 0, cntMora = 0, cntLate = 0;
            for (var ci = 0; ci < cpMembers.length; ci++) {
                var ms = cpMembers[ci].payment_status;
                if (ms === 'paid') cntPaid++;
                else if (ms === 'up_to_date') cntUpToDate++;
                else if (ms === 'mora') cntMora++;
                else if (ms === 'late') cntLate++;
                else cntPending++;
            }
            var cntOk = cntPaid + cntUpToDate;
            var cntDebt = total - cntOk;

            var html = '<div class="gm-subpanel">';
            // Header
            html += '<div class="gm-subpanel-header"><h3>Registrar Pagos</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div>';

            // Progress bar — show actual paid vs total, with breakdown
            var paidPct = total > 0 ? Math.round((cntPaid / total) * 100) : 0;
            var okPct = total > 0 ? Math.round((cntOk / total) * 100) : 0;
            html += '<div style="padding:0 0 12px;">';
            html += '<div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px;"><span style="color:var(--ds-text-muted);">Ciclo ' + cpCycleNumber + '</span><span style="font-weight:600;color:' + rateColor(paidPct) + ';">' + cntPaid + '/' + total + ' pagaron</span></div>';
            html += '<div class="gm-bar"><div class="gm-bar-fill" style="width:' + paidPct + '%;background:var(--ds-green);"></div></div>';
            // Status breakdown
            html += '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;font-size:0.75rem;">';
            if (cntPaid > 0) html += '<span style="color:var(--ds-green);"><i class="fas fa-check-circle"></i> ' + cntPaid + ' pagaron</span>';
            if (cntUpToDate > 0) html += '<span style="color:var(--ds-blue,#3b82f6);"><i class="fas fa-check"></i> ' + cntUpToDate + ' al dia</span>';
            if (cntPending > 0) html += '<span style="color:var(--ds-amber);"><i class="fas fa-clock"></i> ' + cntPending + ' pendientes</span>';
            if (cntMora > 0) html += '<span style="color:var(--ds-red);"><i class="fas fa-exclamation-circle"></i> ' + cntMora + ' en mora</span>';
            if (cntLate > 0) html += '<span style="color:var(--ds-red);"><i class="fas fa-exclamation-triangle"></i> ' + cntLate + ' atrasados</span>';
            html += '</div></div>';

            // Tabs: Individual / Masivo
            html += '<div style="display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--ds-border-subtle,rgba(255,255,255,0.06));">';
            html += '<button class="gm-tab' + (cpActiveTab === 'individual' ? ' active' : '') + '" data-action="cp-tab" data-val="individual" style="flex:1;">Individual</button>';
            html += '<button class="gm-tab' + (cpActiveTab === 'masivo' ? ' active' : '') + '" data-action="cp-tab" data-val="masivo" style="flex:1;">Masivo</button>';
            html += '</div>';

            // Search
            html += '<div style="margin-bottom:10px;"><input type="text" id="cpSearchMember" class="ds-input" placeholder="Buscar miembro..." style="width:100%;"></div>';

            // Tab content
            html += '<div id="cpTabContent" style="max-height:450px;overflow-y:auto;">';
            if (cpActiveTab === 'individual') {
                html += cpRenderIndividualList();
            } else {
                html += cpRenderBulkList();
            }
            html += '</div></div>';

            container.innerHTML = html;

            // Wire search
            var searchEl = document.getElementById('cpSearchMember');
            if (searchEl) {
                searchEl.addEventListener('input', function() {
                    var q = this.value.toLowerCase();
                    container.querySelectorAll('.cp-row').forEach(function(row) {
                        var name = (row.getAttribute('data-name') || '').toLowerCase();
                        var show = name.indexOf(q) >= 0;
                        row.style.display = show ? '' : 'none';
                        // Also hide/show inline form sibling
                        var next = row.nextElementSibling;
                        if (next && next.id && next.id.startsWith('cp-form-')) next.style.display = show ? next.style.display : 'none';
                    });
                });
            }
        } catch(e) {
            container.innerHTML = '<div class="gm-error">Error: ' + esc(e.message) + '</div>';
        }
    }

    function cpStatusPill(status) {
        var map = {
            'paid': { l: 'Pagado', c: 'var(--ds-green)' }, 'up_to_date': { l: 'Al dia', c: 'var(--ds-green)' },
            'pending': { l: 'Pendiente', c: 'var(--ds-amber)' }, 'mora': { l: 'En Mora', c: 'var(--ds-red)' },
            'late': { l: 'Atrasado', c: 'var(--ds-red)' }, 'suspended': { l: 'Suspendido', c: 'var(--ds-text-muted)' }
        };
        var s = map[status] || map['pending'];
        var bgMap = { 'paid': 'var(--ds-green-muted)', 'up_to_date': 'var(--ds-blue-muted)', 'pending': 'var(--ds-amber-muted)', 'mora': 'var(--ds-red-muted)', 'late': 'var(--ds-red-muted)', 'suspended': 'rgba(100,116,139,0.15)' };
        var bg = bgMap[status] || 'var(--ds-amber-muted)';
        return '<span style="font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:12px;background:' + bg + ';color:' + s.c + ';">' + s.l + '</span>';
    }

    function cpRenderIndividualList() {
        var html = '';
        for (var i = 0; i < cpMembers.length; i++) {
            var m = cpMembers[i];
            var isPaid = m.payment_status === 'paid';
            var isMora = m.payment_status === 'mora';
            var isUpToDate = m.payment_status === 'up_to_date';
            var isSuspended = m.payment_status === 'suspended';
            var hasLoan = !!m.active_loan;
            var numPos = parseInt(m.num_positions) || 1;
            var posLabel = numPos > 1 ? '<span style="font-size:0.65rem;color:var(--ds-cyan);">' + numPos + ' pos.</span>' : '';
            var pastUnpaid = (m.unpaid_cycles || []).filter(function(c) { return c < cpCycleNumber; });
            var debtLabel = pastUnpaid.length > 0 ? '<span style="font-size:0.68rem;color:var(--ds-red);margin-left:6px;">Debe: C' + pastUnpaid.join(',C') + ' (L.' + fmt(m.amount_pending || 0) + ')</span>' : '';
            var loanLabel = hasLoan ? '<span style="font-size:0.68rem;color:var(--ds-red);margin-left:6px;"><i class="fas fa-hand-holding-usd" style="font-size:0.6rem;"></i> L.' + fmt(m.active_loan.total_owed) + '</span>' : '';

            // Row — clickable to expand
            html += '<div class="cp-row" data-name="' + esc(m.name || '') + '" style="padding:10px 0;border-bottom:1px solid var(--ds-border-subtle,rgba(255,255,255,0.04));">';
            html += '<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;" data-action="cp-toggle-member" data-uid="' + esc(m.user_id) + '">';
            html += '<div style="flex:1;min-width:0;display:flex;align-items:center;gap:8px;">';
            html += '<i class="fas fa-chevron-right cp-chevron" id="cp-chev-' + esc(m.user_id) + '" style="font-size:0.6rem;color:var(--ds-text-faint);transition:transform 0.2s;"></i>';
            html += '<div><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span style="font-weight:500;">' + esc(m.name || 'Miembro') + '</span>';
            if (m.is_placeholder) html += '<span style="font-size:0.6rem;padding:1px 6px;border-radius:8px;background:var(--ds-purple-muted);color:var(--ds-purple);">Pre-registro</span>';
            html += ' ' + posLabel + '</div>';
            html += '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px;">' + cpStatusPill(m.payment_status);
            if (m.turn_position) html += '<span style="font-size:0.68rem;color:var(--ds-text-faint);">Turno #' + m.turn_position + '</span>';
            html += debtLabel + loanLabel + '</div></div></div>';

            // Compact status indicator on right
            var rightIcon = isPaid && !hasLoan ? '<i class="fas fa-check-circle" style="color:var(--ds-green);"></i>' : isMora ? '<i class="fas fa-exclamation-circle" style="color:var(--ds-red);"></i>' : isSuspended ? '<i class="fas fa-ban" style="color:var(--ds-text-muted);"></i>' : '<i class="fas fa-ellipsis-h" style="color:var(--ds-text-faint);"></i>';
            html += '<div style="flex-shrink:0;">' + rightIcon + '</div>';
            html += '</div>';

            // Expandable panel (hidden by default)
            html += '<div id="cp-panel-' + esc(m.user_id) + '" style="display:none;margin-top:8px;padding:12px;background:var(--ds-bg-surface);border:1px solid var(--ds-border-subtle,rgba(255,255,255,0.06));border-radius:10px;">';

            // Member detail header
            html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
            html += '<div style="font-size:0.85rem;font-weight:600;">' + esc(m.name || 'Miembro') + '</div>';
            html += '<div style="font-size:0.75rem;color:var(--ds-text-faint);">Ciclo ' + cpCycleNumber + ' &middot; ' + (m.cycles_paid || 0) + '/' + cpCycleNumber + ' pagados</div>';
            html += '</div>';

            // Action buttons grid
            html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">';

            if (isMora) {
                html += '<button class="ds-btn ds-btn-sm ds-btn-primary" data-action="cp-register-single" data-uid="' + esc(m.user_id) + '"><i class="fas fa-money-bill-wave"></i> Registrar Pago</button>';
            } else if (isSuspended) {
                html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-amber);color:#000;border:none;" data-action="cp-register-single" data-uid="' + esc(m.user_id) + '"><i class="fas fa-undo"></i> Pagar (reactivar)</button>';
            } else if (isPaid) {
                html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-blue-muted);color:var(--ds-blue);border:1px solid var(--ds-blue-muted);" data-action="cp-register-single" data-uid="' + esc(m.user_id) + '"><i class="fas fa-forward"></i> Adelantar Pago</button>';
            } else {
                // pending, late, up_to_date (not yet paid current cycle)
                html += '<button class="ds-btn ds-btn-sm ds-btn-primary" data-action="cp-register-single" data-uid="' + esc(m.user_id) + '"><i class="fas fa-money-bill-wave"></i> Registrar Pago</button>';
            }

            // Mark mora (only for pending/late/up_to_date, not already mora/paid/suspended)
            if (!isPaid && !isMora && !isSuspended) {
                html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-red-muted);color:var(--ds-red);border:1px solid var(--ds-red-muted);" data-action="cp-mark-mora" data-uid="' + esc(m.user_id) + '" data-name="' + esc(m.name || '') + '"><i class="fas fa-exclamation-triangle"></i> Marcar Mora</button>';
            }

            // Loan actions
            if (hasLoan) {
                html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-red);color:#fff;border:none;" data-action="cp-loan-pay" data-uid="' + esc(m.user_id) + '" data-loan-id="' + esc(m.active_loan.id) + '" data-owed="' + (m.active_loan.total_owed || 0) + '"><i class="fas fa-hand-holding-usd"></i> Abonar Prestamo (L.' + fmt(m.active_loan.total_owed) + ')</button>';
            }
            // Merge button for placeholder members
            if (m.is_placeholder) {
                html += '<div style="margin-top:6px;padding:8px;border-radius:8px;background:var(--ds-purple-muted);border:1px solid rgba(168,85,247,0.2);">';
                html += '<div style="font-size:0.72rem;color:var(--ds-purple);margin-bottom:6px;"><i class="fas fa-link"></i> Este miembro es un pre-registro. Si ya creo su cuenta, fusionalo:</div>';
                html += '<div style="display:flex;gap:6px;align-items:center;">';
                html += '<input type="text" id="merge-search-' + esc(m.user_id) + '" class="ds-input ds-input-sm" placeholder="Buscar por nombre o email..." style="flex:1;font-size:0.75rem;">';
                html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-purple);color:#fff;border:none;flex-shrink:0;" data-action="gm-search-merge" data-ph-id="' + esc(m.user_id) + '"><i class="fas fa-search"></i></button>';
                html += '</div>';
                html += '<div id="merge-results-' + esc(m.user_id) + '" style="margin-top:6px;"></div>';
                html += '</div>';
            }
            html += '</div>';

            // Per-position detail for multi-position members
            if (numPos > 1) {
                html += '<div style="font-size:0.75rem;color:var(--ds-text-faint);margin-bottom:4px;">Detalle por posicion:</div>';
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;">';
                for (var p = 0; p < numPos; p++) {
                    // Check how many contributions this member has for current cycle
                    var paidThisCycle = 0;
                    if (m.unpaid_cycles && m.unpaid_cycles.indexOf(cpCycleNumber) === -1) paidThisCycle = numPos;
                    else paidThisCycle = (m.cycles_paid || 0) > 0 ? Math.min(numPos, numPos - 1) : 0; // approximate
                    var posPaid = p < (numPos - (pastUnpaid.indexOf(cpCycleNumber) >= 0 ? (numPos - (m.cycles_paid % numPos || 0)) : 0));
                    html += '<div style="padding:4px 8px;border-radius:6px;background:' + (p < numPos ? 'var(--ds-bg-elevated)' : 'var(--ds-green-muted)') + ';font-size:0.72rem;text-align:center;">Pos. ' + (p + 1) + '</div>';
                }
                html += '</div>';
            }

            // Unpaid cycles detail
            if (pastUnpaid.length > 0) {
                html += '<div style="margin-top:8px;padding:8px;border-radius:6px;background:rgba(239,68,68,0.05);border:1px solid var(--ds-red-muted);">';
                html += '<div style="font-size:0.72rem;font-weight:600;color:var(--ds-red);margin-bottom:4px;">Ciclos con deuda:</div>';
                for (var ui = 0; ui < pastUnpaid.length; ui++) {
                    var uc = pastUnpaid[ui];
                    // Find how many positions are paid for this cycle from cycleCounts
                    // We don't have per-cycle counts on frontend, so use unpaid_cycles as indicator
                    html += '<div style="font-size:0.72rem;color:var(--ds-text-secondary);">C' + uc + ': impago' + (numPos > 1 ? ' (' + numPos + ' pos. x L.' + fmt(cpContribAmount) + ' = L.' + fmt(cpContribAmount * numPos) + ')' : ' (L.' + fmt(cpContribAmount) + ')') + '</div>';
                }
                html += '<div style="font-size:0.75rem;font-weight:600;color:var(--ds-red);margin-top:4px;">Total deuda: L. ' + fmt(m.amount_pending || 0) + '</div>';
                html += '</div>';
            }

            // Loan detail
            if (hasLoan) {
                var loan = m.active_loan;
                html += '<div style="margin-top:8px;padding:8px;border-radius:6px;background:rgba(239,68,68,0.05);border:1px solid var(--ds-red-muted);">';
                html += '<div style="font-size:0.72rem;font-weight:600;color:var(--ds-red);margin-bottom:4px;">Prestamo activo:</div>';
                html += '<div style="font-size:0.72rem;color:var(--ds-text-secondary);">Principal: L.' + fmt(loan.principal) + ' &middot; Adeuda: L.' + fmt(loan.total_owed) + ' &middot; Pagado: L.' + fmt(loan.paid_amount || 0) + '</div>';
                if (loan.source_cycles && loan.source_cycles.length > 0) html += '<div style="font-size:0.72rem;color:var(--ds-text-faint);">Ciclos: C' + loan.source_cycles.join(', C') + '</div>';
                html += '</div>';
            }

            html += '</div>'; // end panel
            html += '</div>'; // end cp-row

            // Inline form placeholder (for register/adelantar)
            html += '<div id="cp-form-' + esc(m.user_id) + '" style="display:none;"></div>';
        }
        return html;
    }

        function cpRenderBulkList() {
        var pending = cpMembers.filter(function(m) { return m.payment_status !== 'paid'; });
        var selCount = Object.keys(cpSelectedBulk).filter(function(k) { return cpSelectedBulk[k]; }).length;

        var html = '';
        // Bulk controls
        html += '<div style="margin-bottom:12px;padding:12px;background:var(--ds-bg-surface);border:1px solid var(--ds-border-subtle,rgba(255,255,255,0.06));border-radius:10px;">';
        html += '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;margin-bottom:10px;"><input type="checkbox" id="cpSelectAll" data-action="cp-select-all" ' + (selCount === pending.length && pending.length > 0 ? 'checked' : '') + ' style="accent-color:var(--ds-cyan);width:16px;height:16px;"> Seleccionar todos pendientes (' + pending.length + ')</label>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
        html += '<div class="gm-form-group"><label>Monto</label><input type="number" id="cpBulkAmount" class="ds-input" value="' + cpContribAmount + '" step="0.01" min="0.01"></div>';
        html += '<div class="gm-form-group"><label>Metodo</label><select id="cpBulkMethod" class="ds-select"><option value="cash">Efectivo</option><option value="bank_transfer">Transferencia</option><option value="tigo_money">Tigo Money</option><option value="wallet">Wallet LTD</option></select></div>';
        html += '</div>';
        html += '<div class="gm-form-group"><label>Notas (opcional)</label><input type="text" id="cpBulkNotes" class="ds-input" placeholder="Notas para estos pagos..."></div>';
        html += '<div style="font-size:0.7rem;color:var(--ds-text-faint);font-style:italic;">Cada registro aplica 1 cuota por miembro (al ciclo mas antiguo impago)</div>';
        html += '</div>';

        // Member checkboxes
        for (var i = 0; i < cpMembers.length; i++) {
            var m = cpMembers[i];
            var isPaid = m.payment_status === 'paid';
            var isChecked = !isPaid && cpSelectedBulk[m.user_id];
            html += '<div class="cp-row" data-name="' + esc(m.name || '') + '" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--ds-border-subtle,rgba(255,255,255,0.04));' + (isPaid ? 'opacity:0.4;' : '') + '">';
            if (!isPaid) html += '<input type="checkbox" data-action="cp-toggle-bulk" data-uid="' + esc(m.user_id) + '" ' + (isChecked ? 'checked' : '') + ' style="accent-color:var(--ds-cyan);width:16px;height:16px;">';
            else html += '<div style="width:16px;"></div>';
            html += '<div style="flex:1;min-width:0;"><span style="font-weight:500;">' + esc(m.name || 'Miembro') + (m.is_placeholder ? ' <span style="font-size:0.6rem;padding:1px 6px;border-radius:8px;background:var(--ds-purple-muted);color:var(--ds-purple);">Pre-reg.</span>' : '') + '</span></div>';
            html += '<div style="text-align:right;">' + cpStatusPill(m.payment_status);
            if (m.num_positions && m.num_positions > 1) html += '<div style="font-size:0.65rem;color:var(--ds-cyan);">' + m.num_positions + ' pos. (L. ' + fmt(cpContribAmount * m.num_positions) + ')</div>';
            var pastU = (m.unpaid_cycles || []).filter(function(c) { return c < cpCycleNumber; });
            if (pastU.length > 0) html += '<div style="font-size:0.65rem;color:var(--ds-red);">Debe: C' + pastU.join(',C') + ' (L.' + fmt(m.amount_pending || 0) + ')</div>';
            html += '</div></div>';
        }

        // Submit
        html += '<div style="padding:14px 0;"><button class="ds-btn ds-btn-primary" data-action="cp-submit-bulk" style="width:100%;"' + (selCount === 0 ? ' disabled' : '') + '>Registrar ' + selCount + ' pago' + (selCount !== 1 ? 's' : '') + '</button></div>';
        return html;
    }

    function cpShowInlineForm(userId) {
        // Close previous
        document.querySelectorAll('[id^="cp-form-"]').forEach(function(el) { el.style.display = 'none'; });
        var formEl = document.getElementById('cp-form-' + userId);
        if (!formEl) return;
        var m = cpMembers.find(function(mm) { return mm.user_id === userId; });
        var numPos = m ? (m.num_positions || 1) : 1;
        // Default amount = 1 contribution (per position), not total debt
        var amt = cpContribAmount;

        // Determine which cycle this payment will go to
        var unpaid = (m ? m.unpaid_cycles : null) || [];
        var isPaid = m && m.payment_status === 'paid';
        var targetCycleLabel = '';

        if (isPaid) {
            // Adelantar: next cycle after current
            targetCycleLabel = '<div style="font-size:0.78rem;color:var(--ds-blue);margin-bottom:8px;"><i class="fas fa-forward" style="font-size:0.65rem;"></i> <strong>Adelanto</strong> — Se registrara para el proximo ciclo disponible despues de C' + cpCycleNumber + '</div>';
        } else if (unpaid.length > 0) {
            var nextUnpaid = unpaid[0];
            // Check how many positions are paid for that cycle
            var paidForCycle = m.cycles_paid || 0; // approximate
            targetCycleLabel = '<div style="font-size:0.78rem;color:var(--ds-amber);margin-bottom:8px;"><i class="fas fa-arrow-right" style="font-size:0.65rem;"></i> Se aplicara a <strong>Ciclo ' + nextUnpaid + '</strong>' + (numPos > 1 ? ' (siguiente posicion impaga)' : '') + '</div>';
        } else {
            targetCycleLabel = '<div style="font-size:0.78rem;color:var(--ds-cyan);margin-bottom:8px;"><i class="fas fa-arrow-right" style="font-size:0.65rem;"></i> Se aplicara a <strong>Ciclo ' + cpCycleNumber + '</strong></div>';
        }

        formEl.style.display = 'block';
        formEl.innerHTML = '<div style="padding:10px;margin:6px 0;background:var(--ds-bg-surface);border:1px solid var(--ds-cyan-border);border-radius:10px;">' +
            targetCycleLabel +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
            '<div class="gm-form-group"><label>Monto (1 cuota)</label><input type="number" id="cp-amt-' + esc(userId) + '" class="ds-input" value="' + amt + '" step="0.01" min="0.01"></div>' +
            '<div class="gm-form-group"><label>Metodo</label><select id="cp-meth-' + esc(userId) + '" class="ds-select"><option value="cash">Efectivo</option><option value="bank_transfer">Transferencia</option><option value="tigo_money">Tigo Money</option><option value="wallet">Wallet LTD</option><option value="card">Tarjeta</option></select></div>' +
            '</div>' +
            '<div class="gm-form-group"><label>Notas (opcional)</label><input type="text" id="cp-notes-' + esc(userId) + '" class="ds-input" placeholder="Ref. bancaria, recibo..." maxlength="500"></div>' +
            '<div style="display:flex;gap:8px;justify-content:flex-end;align-items:center;">' +
            (numPos > 1 ? '<span style="font-size:0.7rem;color:var(--ds-text-faint);margin-right:auto;">Registra 1 posicion por clic</span>' : '') +
            '<button class="ds-btn ds-btn-secondary ds-btn-sm" data-action="cp-cancel-form" data-uid="' + esc(userId) + '">Cancelar</button>' +
            '<button class="ds-btn ds-btn-primary ds-btn-sm" data-action="cp-confirm-single" data-uid="' + esc(userId) + '">Confirmar</button>' +
            '</div></div>';

    async function cpConfirmSingle(userId) {
        var amtEl = document.getElementById('cp-amt-' + userId);
        var methEl = document.getElementById('cp-meth-' + userId);
        var notesEl = document.getElementById('cp-notes-' + userId);
        if (!amtEl) return;
        var amount = parseFloat(amtEl.value);
        if (!amount || amount <= 0) { showToast('Monto invalido', 'error'); return; }

        var btn = document.querySelector('[data-action="cp-confirm-single"][data-uid="' + userId + '"]');
        if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

        // M4: Show loading overlay on form
        var formEl = document.getElementById('cp-form-' + userId);
        if (formEl) formEl.style.opacity = '0.5';

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/contributions/record-for-member', {
                method: 'POST', headers: jsonHeaders(),
                body: JSON.stringify({ member_user_id: userId, amount: amount, payment_method: methEl ? methEl.value : 'cash', notes: notesEl ? notesEl.value : '' })
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            // H2+L2: Show confirmation code + cycle + amount
            var d = data.data;
            var code = d.confirmation_code || '';
            var cycle = d.cycle_number || '';
            var memberName = (cpMembers.find(function(m) { return m.user_id === userId; }) || {}).name || '';
            showToast('Pago registrado — Ciclo ' + cycle + ' — L. ' + fmt(amount) + (code ? ' — Codigo: ' + code : '') + (memberName ? ' (' + memberName + ')' : ''), 'success');
            renderRegistrarPago(document.getElementById('pagosSubPanel'));
        } catch(e) {
            showToast(e.message, 'error');
            if (btn) { btn.disabled = false; btn.textContent = 'Confirmar'; }
            if (formEl) formEl.style.opacity = '1';
        }
    }

    async function cpSubmitBulk() {
        var selected = Object.keys(cpSelectedBulk).filter(function(k) { return cpSelectedBulk[k]; });
        if (selected.length === 0) return;
        var amtEl = document.getElementById('cpBulkAmount');
        var methEl = document.getElementById('cpBulkMethod');
        var notesEl = document.getElementById('cpBulkNotes');
        var amount = parseFloat(amtEl ? amtEl.value : cpContribAmount);
        if (!amount || amount <= 0) { showToast('Monto invalido', 'error'); return; }

        var btn = document.querySelector('[data-action="cp-submit-bulk"]');
        if (btn) { btn.disabled = true; btn.textContent = 'Registrando...'; }

        try {
            var members = selected.map(function(uid) { var item = { member_user_id: uid, amount: amount }; if (notesEl && notesEl.value.trim()) item.notes = notesEl.value.trim(); return item; });
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/contributions/record-bulk', {
                method: 'POST', headers: jsonHeaders(),
                body: JSON.stringify({ members: members, payment_method: methEl ? methEl.value : 'cash' })
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            var d = data.data;
            var bulkCodes = d.confirmations ? d.confirmations.map(function(c) { return c.confirmation_code; }).join(', ') : '';
            showToast(d.recorded + ' pago(s) registrados para ciclo ' + (d.cycle_number || cpCycleNumber) + (d.failed > 0 ? ' — ' + d.failed + ' fallido(s)' : '') + (bulkCodes ? ' — Codigos: ' + bulkCodes : ''), 'success');
            cpSelectedBulk = {};
            renderRegistrarPago(document.getElementById('pagosSubPanel'));
        } catch(e) {
            showToast(e.message, 'error');
            if (btn) { btn.disabled = false; btn.textContent = 'Registrar ' + selected.length + ' pagos'; }
        }
    }

    async function cpMarkMora(userId, userName) {

        if (!ok) return;

    async function cpLoanPay(userId, loanId, totalOwed) {
        var maxAmt = parseFloat(totalOwed) || 0;
        var member = cpMembers.find(function(m) { return m.user_id === userId; });
        var memberName = member ? member.name : 'Miembro';

        // Show inline loan payment form
        var formHtml = '<div style="padding:12px;margin:8px 0;background:var(--ds-bg-surface);border:1px solid var(--ds-red-muted);border-radius:10px;">' +
            '<div style="font-size:0.85rem;font-weight:600;margin-bottom:8px;">Abonar a prestamo de ' + esc(memberName) + '</div>' +
            '<div style="font-size:0.78rem;color:var(--ds-red);margin-bottom:10px;">Deuda: L. ' + fmt(maxAmt) + '</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
            '<div class="gm-form-group"><label>Monto</label><input type="number" id="cpLoanAmt" class="ds-input" value="' + maxAmt + '" min="1" max="' + maxAmt + '" step="0.01"></div>' +
            '<div class="gm-form-group"><label>Metodo</label><select id="cpLoanMethod" class="ds-select"><option value="cash">Efectivo</option><option value="bank_transfer">Transferencia</option><option value="tigo_money">Tigo Money</option><option value="wallet">Wallet LTD</option></select></div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">' +
            '<button class="ds-btn ds-btn-secondary ds-btn-sm" data-action="cp-cancel-loan">Cancelar</button>' +
            '<button class="ds-btn ds-btn-sm" style="background:var(--ds-red);color:#fff;" id="cpLoanSubmitBtn" data-loan-id="' + esc(loanId) + '">Registrar Abono</button>' +
            '</div></div>';

        // Find the member row and insert form after it
        var rows = document.querySelectorAll('.cp-row');
        for (var r = 0; r < rows.length; r++) {
            var loanBtn = rows[r].querySelector('[data-action="cp-loan-pay"][data-uid="' + userId + '"]');
            if (loanBtn) { rows[r].insertAdjacentHTML('afterend', formHtml); break; }
        }

        // Wire submit
        var submitBtn = document.getElementById('cpLoanSubmitBtn');
        if (submitBtn) {
            submitBtn.onclick = async function() {
                var amt = parseFloat(document.getElementById('cpLoanAmt').value);
                var method = document.getElementById('cpLoanMethod').value;
                if (!amt || amt <= 0) { showToast('Monto invalido', 'error'); return; }
                if (amt > maxAmt) { showToast('El monto no puede exceder la deuda de L. ' + fmt(maxAmt), 'error'); return; }
                submitBtn.disabled = true; submitBtn.textContent = 'Registrando...';
                try {
                    var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/loans/' + encodeURIComponent(loanId) + '/pay', {
                        method: 'POST', headers: jsonHeaders(),
                        body: JSON.stringify({ amount: amt, payment_method: method })
                    });
                    var data = await res.json();
                    if (!data.success) throw new Error(data.data?.error?.message || 'Error');
                    showToast('Abono de L. ' + fmt(amt) + ' registrado', 'success');
                    renderRegistrarPago(document.getElementById('pagosSubPanel'));
                } catch(e) {
                    showToast(e.message, 'error');
                    submitBtn.disabled = false; submitBtn.textContent = 'Registrar Abono';
                }
            };
        }
    }

                    (c.confirmation_code ? '<div style="font-size:0.7rem;color:var(--ds-text-muted);">Codigo: ' + esc(c.confirmation_code) + '</div>' : '') +

                    '<button class="ds-btn ds-btn-sm" style="background:var(--ds-red-muted);color:var(--ds-red);border:1px solid var(--ds-red-muted);" data-action="vp-reject" data-cid="' + esc(c.contribution_id || c.id) + '"><i class="fas fa-times"></i> Rechazar</button>' +

    async function approvePayment(cid) {
        var ok = await showConfirm('Confirmas que este pago es valido?');
        if (!ok) return;
        try {
            var res = await fetch(API_BASE + '/api/contributions/' + encodeURIComponent(cid) + '/verify', {
                method: 'POST', headers: jsonHeaders(),
                body: JSON.stringify({ action: 'approve' })
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            var d = data.data || {};
            var msg = 'Pago aprobado';
            if (d.mora_resolved) msg += ' — mora resuelta';
            if (d.loan_reduced) msg += ' — prestamo reducido';
            if (d.loan_closed) msg += ' — prestamo cerrado';
            showToast(msg, 'success');
            renderVerificarPagos(document.getElementById('pagosSubPanel'));
        } catch(e) { showToast(e.message || 'Error al aprobar pago', 'error'); }
    }

    async function rejectPayment(cid) {
        // Show reason input before rejecting
        var reason = await askReason('Razon del rechazo (opcional)');
        if (reason === null) return; // cancelled
        try {
            var res = await fetch(API_BASE + '/api/contributions/' + encodeURIComponent(cid) + '/verify', {
                method: 'POST', headers: jsonHeaders(),
                body: JSON.stringify({ action: 'reject', rejection_reason: reason || 'Rechazado por coordinador' })
            });
            var data = await res.json();
            if (!data.success) throw new Error('');
            showToast('Pago rechazado', 'success');
            renderVerificarPagos(document.getElementById('pagosSubPanel'));
        } catch(e) { showToast('Error al rechazar pago', 'error'); }
    }

    function askReason(title) {
        return new Promise(function(resolve) {
            var ov = document.createElement('div');
            ov.className = 'gm-confirm-overlay';
            ov.style.display = 'flex';
            ov.innerHTML = '<div class="gm-confirm-box"><p style="font-weight:600;">' + esc(title) + '</p>' +
                '<textarea id="gmReasonInput" rows="3" class="ds-textarea" placeholder="Escribe aqui..." style="width:100%;margin-bottom:12px;"></textarea>' +
                '<div class="gm-confirm-actions"><button class="ds-btn ds-btn-secondary" id="gmReasonCancel">Cancelar</button><button class="ds-btn ds-btn-danger" id="gmReasonOk">Rechazar</button></div></div>';
            document.body.appendChild(ov);
            document.getElementById('gmReasonOk').onclick = function() { var v = document.getElementById('gmReasonInput').value.trim(); ov.remove(); resolve(v); };
            document.getElementById('gmReasonCancel').onclick = function() { ov.remove(); resolve(null); };
            ov.onclick = function(e) { if (e.target === ov) { ov.remove(); resolve(null); } };
        });
    }

                html += '<div style="margin-bottom:10px;padding:8px 12px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid var(--ds-amber-muted);font-size:0.78rem;color:var(--ds-amber);"><i class="fas fa-exclamation-triangle"></i> ' + d.mora_positions + ' posicion(es) cubiertas por mora — el dinero real recaudado es L. ' + fmt(d.actual_collected) + ' de L. ' + fmt(d.target_total) + '</div>';

            if (d.beneficiary_loan) {
                var bl = d.beneficiary_loan;
                html += '<div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid var(--ds-red-muted);font-size:0.8rem;">';
                html += '<div style="color:var(--ds-red);font-weight:600;margin-bottom:4px;"><i class="fas fa-hand-holding-usd"></i> Retencion por prestamo</div>';
                html += '<div style="color:var(--ds-text-secondary);">' + esc(benef.user_name || 'Beneficiario') + ' tiene deuda de L. ' + fmt(bl.total_owed) + '. Se descontaran L. ' + fmt(bl.retention_amount) + ' automaticamente.</div>';
                html += '<div style="color:var(--ds-green);font-weight:600;margin-top:4px;">Beneficiario recibira: L. ' + fmt(bl.net_after_retention) + '</div>';
                html += '</div>';
            }

            if (d.can_distribute) {
                html += '<button class="ds-btn ds-btn-primary" data-action="dist-execute" style="width:100%;padding:14px;font-size:1rem;"><i class="fas fa-share-alt"></i> Ejecutar Distribucion — Ciclo ' + (d.next_distribution_cycle || '?') + '</button>';
            } else {
                var reason = '';
                var filledPos = (coll.total_contributions || 0) + (d.mora_positions || 0);
                if (filledPos < d.positions_filled) reason = 'Faltan ' + (d.positions_filled - filledPos) + ' posiciones por cubrir (pagos: ' + (coll.total_contributions || 0) + ', moras: ' + (d.mora_positions || 0) + ' de ' + d.positions_filled + ')';
