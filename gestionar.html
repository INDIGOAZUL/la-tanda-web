            container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Distribuir</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-error">' + esc(e.message) + '</div></div>';
        }
    }

    async function executeDistribution() {
        var ok = await showConfirm('Confirmar distribucion? Esta accion no se puede deshacer. El beneficiario recibira los fondos y las contribuciones seran archivadas.');
        if (!ok) return;
        var btn = document.querySelector('[data-action="dist-execute"]');
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...'; }
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/distribution/execute', {
                method: 'POST', headers: jsonHeaders()
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            var d = data.data || {};
            // H3: Show detailed result
            var msg = 'Distribucion ejecutada — Ciclo ' + (d.distribution_cycle || '?');
            if (d.net_amount != null) msg += ' — Beneficiario recibe: L. ' + fmt(d.net_amount);
            if (d.loan_deduction > 0) msg += ' (L. ' + fmt(d.loan_deduction) + ' retenidos por prestamo)';
            showToast(msg, 'success');
            // Refresh page
            init();
        } catch(e) {
            showToast(e.message, 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-share-alt"></i> Ejecutar Distribucion'; }
        }
    }

    // -- Historial de Pagos --
    async function renderHistorial(container) {
        container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Historial de Pagos</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i></div></div>';

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/contribution-history?view=matrix', { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error('');
            var d = data.data;
            var membersArr = d.members || [];
            var membersMap = {};
            for (var mi2 = 0; mi2 < membersArr.length; mi2++) {
                var mm = membersArr[mi2];
                if (typeof mm === 'object' && mm.user_id) membersMap[mm.user_id] = mm;
            }
            if (membersArr.length === 0 && typeof d.members === 'object') {
                Object.keys(d.members).forEach(function(k) { membersMap[k] = { user_id: k, name: d.members[k] }; });
            }
            var contribs = d.contributions || {};
            var cycleTotals = d.cycle_totals || [];
            var memberIds = Object.keys(membersMap);
            var maxCycle = d.current_cycle || cycleTotals.length || groupData.current_cycle || 1;
            var contribAmt = d.contribution_amount || groupData.contribution_amount || 0;

            // Store for drilldown
            window._histData = { membersMap: membersMap, contribs: contribs, maxCycle: maxCycle, contribAmt: contribAmt, cycleTotals: cycleTotals };

            if (memberIds.length === 0) {
                container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Historial</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-empty">Sin datos</div></div>';
                return;
            }

            var html = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Historial de Pagos</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div>';

            // Matrix table
            html += '<div style="overflow-x:auto;"><table class="gm-matrix">';
            html += '<thead><tr><th class="gm-matrix-name">Miembro</th>';
            for (var c = 1; c <= maxCycle; c++) html += '<th>C' + c + '</th>';
            html += '</tr></thead><tbody>';

            for (var mi = 0; mi < memberIds.length; mi++) {
                var uid = memberIds[mi];
                var mInfo = membersMap[uid] || {};
                var mName = mInfo.name || 'Miembro';
                var numPos = parseInt(mInfo.num_positions) || 1;
                var userContribs = contribs[uid] || {};
                html += '<tr>';
                html += '<td class="gm-matrix-name" style="cursor:pointer;color:var(--ds-cyan);" data-action="hist-drilldown" data-uid="' + esc(uid) + '">' + esc(mName) + (numPos > 1 ? ' <span style="font-size:0.6rem;color:var(--ds-text-faint);">(' + numPos + 'p)</span>' : '') + '</td>';
                for (var ci = 1; ci <= maxCycle; ci++) {
                    var cc = userContribs[ci];
                    if (cc) {
                        var st = cc.status;
                        if (st === 'completed' || st === 'coordinator_approved' || st === 'archived') {
                            html += '<td class="gm-cell-paid"><i class="fas fa-check"></i></td>';
                        } else if (st === 'pending') {
                            html += '<td class="gm-cell-pending"><i class="fas fa-clock"></i></td>';
                        } else if (st === 'refunded') {
                            html += '<td class="gm-cell-refunded"><i class="fas fa-undo"></i></td>';
                        } else {
                            html += '<td class="gm-cell-rejected"><i class="fas fa-times"></i></td>';
                        }
                    } else {
                        html += '<td class="gm-cell-none">&mdash;</td>';
                    }
                }
                html += '</tr>';
            }

            // Summary row
            var ctMap = {};
            for (var cti = 0; cti < cycleTotals.length; cti++) { ctMap[cycleTotals[cti].cycle] = cycleTotals[cti]; }
            html += '<tr class="gm-matrix-summary"><td>Total</td>';
            for (var si = 1; si <= maxCycle; si++) {
                var ct = ctMap[si] || {};
                var cpct2 = ct.percent || 0;
                html += '<td style="color:' + rateColor(cpct2) + ';">' + cpct2 + '%</td>';
            }
            html += '</tr></tbody></table></div>';

            // Drilldown area
            html += '<div id="histDrilldown" style="margin-top:12px;"></div>';
            html += '</div>';
            container.innerHTML = html;

        } catch(e) {
            container.innerHTML = '<div class="gm-error">Error al cargar historial</div>';
        }
    }

    // Drilldown: show individual contributions for a member (with reversal buttons)
    async function histShowMemberDetail(userId) {
        var dd = document.getElementById('histDrilldown');
        if (!dd) return;
        dd.innerHTML = '<div class="gm-loading-sm"><i class="fas fa-spinner fa-spin"></i></div>';

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/contribution-history?view=timeline&user_id=' + encodeURIComponent(userId), { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error('');
            var d = data.data;
            var contributions = d.contributions || [];
            var memberName = d.member_name || 'Miembro';
            var numPositions = parseInt(d.num_positions) || 1;

            var html = '<div class="ds-card" style="padding:14px;">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
            html += '<div><span style="font-weight:600;font-size:0.95rem;">' + esc(memberName) + '</span>';
            if (numPositions > 1) html += ' <span style="font-size:0.7rem;padding:2px 6px;border-radius:8px;background:var(--ds-cyan-muted);color:var(--ds-cyan);">' + numPositions + ' posiciones</span>';
            html += '</div>';
            html += '<button class="ds-btn ds-btn-sm ds-btn-secondary" data-action="hist-close-detail"><i class="fas fa-times"></i> Cerrar</button></div>';

            if (contributions.length === 0) {
                html += '<div class="gm-empty">Sin contribuciones registradas</div>';
            } else {
                // Group by cycle
                var byCycle = {};
                contributions.forEach(function(c) {
                    var cy = c.cycle_number || 0;
                    if (!byCycle[cy]) byCycle[cy] = [];
                    byCycle[cy].push(c);
                });

                var cycles = Object.keys(byCycle).sort(function(a,b) { return parseInt(b) - parseInt(a); });
                var methodLabels = { 'cash': 'Efectivo', 'bank_transfer': 'Transferencia', 'tigo_money': 'Tigo Money', 'wallet': 'Wallet', 'card': 'Tarjeta', 'crypto': 'Crypto', 'coordinator_manual': 'Manual', 'coordinator_bulk': 'Masivo', 'deposit': 'Deposito' };

                for (var ci = 0; ci < cycles.length; ci++) {
                    var cycleNum = cycles[ci];
                    var entries = byCycle[cycleNum];
                    html += '<div style="margin-bottom:12px;"><div style="font-size:0.78rem;font-weight:600;color:var(--ds-text-secondary);margin-bottom:4px;">Ciclo ' + cycleNum + ' (' + entries.length + '/' + numPositions + ' posiciones)</div>';

                    for (var ei = 0; ei < entries.length; ei++) {
                        var e = entries[ei];
                        var isRefunded = e.status === 'refunded';
                        var isPaid = ['completed','coordinator_approved','archived'].indexOf(e.status) >= 0;
                        var borderColor = isRefunded ? 'var(--ds-purple,#a855f7)' : isPaid ? 'var(--ds-green)' : e.status === 'pending' ? 'var(--ds-amber)' : 'var(--ds-red)';
                        var statusLabel = isRefunded ? 'Revertido' : isPaid ? 'Pagado' : e.status === 'pending' ? 'Pendiente' : 'Rechazado';

                        html += '<div style="padding:8px 10px;margin-bottom:4px;border-left:3px solid ' + borderColor + ';background:var(--ds-bg-elevated);border-radius:0 6px 6px 0;display:flex;justify-content:space-between;align-items:center;">';
                        html += '<div>';
                        if (numPositions > 1) html += '<span style="font-size:0.65rem;color:var(--ds-text-faint);">Pos. ' + (ei + 1) + '</span> ';
                        html += '<span style="font-weight:500;">L. ' + fmt(e.amount) + '</span> ';
                        html += '<span style="font-size:0.7rem;color:var(--ds-text-faint);">' + (methodLabels[e.verification_method] || methodLabels[e.payment_method] || e.payment_method || '') + '</span>';
                        if (e.confirmation_code) html += ' <span style="font-size:0.65rem;color:var(--ds-text-muted);">' + esc(e.confirmation_code) + '</span>';
                        html += '<div style="font-size:0.68rem;color:var(--ds-text-muted);">' + statusLabel;
                        if (e.created_at) html += ' &middot; ' + new Date(e.created_at).toLocaleDateString('es-HN', {day:'numeric', month:'short'});
                        if (e.verified_by_name) html += ' &middot; por ' + esc(e.verified_by_name);
                        html += '</div>';
                        if (isRefunded) {
                            html += '<div style="font-size:0.68rem;color:var(--ds-purple,#a855f7);"><i class="fas fa-undo" style="font-size:0.6rem;"></i> ' + esc(e.reversal_reason || 'Sin motivo');
                            if (e.reversed_by_name) html += ' &middot; por ' + esc(e.reversed_by_name);
                            if (e.reversed_at) html += ' &middot; ' + new Date(e.reversed_at).toLocaleDateString('es-HN', {day:'numeric', month:'short'});
                            html += '</div>';
                        }
                        html += '</div>';

                        // Reversal button (only for paid, non-refunded contributions)
                        if (isPaid) {
                            html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-amber-muted);color:var(--ds-amber);border:1px solid var(--ds-amber-muted);font-size:0.7rem;white-space:nowrap;" data-action="hist-reverse" data-cid="' + esc(e.id || e.contribution_id) + '" data-name="' + esc(memberName) + '" data-cycle="' + cycleNum + '" data-amount="' + (e.amount || 0) + '" data-pos="' + (ei + 1) + '"><i class="fas fa-undo"></i> Deshacer</button>';
                        }
                        html += '</div>';
                    }
                    html += '</div>';
                }
            }
            html += '</div>';
            dd.innerHTML = html;
        } catch(e) {
            dd.innerHTML = '<div class="gm-error">Error al cargar detalle del miembro</div>';
        }
    }

    // Reverse a specific contribution
    async function histReverseContribution(contribId, memberName, cycleNum, amount, posNum) {
        var label = 'Deshacer pago de ' + memberName + ' — Ciclo ' + cycleNum + (posNum ? ', Pos. ' + posNum : '') + ' (L. ' + fmt(parseFloat(amount) || 0) + ')';
        // Show confirm with reason input
        var reason = await histAskReason(label);
        if (reason === null) return; // cancelled

        try {
            var res = await fetch(API_BASE + '/api/contributions/' + encodeURIComponent(contribId) + '/reverse', {
                method: 'POST', headers: jsonHeaders(),
                body: JSON.stringify({ reason: reason || 'Revertido por coordinador' })
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error al revertir');
            showToast('Pago revertido — Ciclo ' + cycleNum + (data.data?.mora_created ? ' (mora creada)' : ''), 'success');
            // Refresh historial
            renderHistorial(document.getElementById('pagosSubPanel'));
        } catch(e) {
            showToast(e.message || 'Error al revertir pago', 'error');
        }
    }

    // Reason input dialog for reversal
    function histAskReason(label) {
        return new Promise(function(resolve) {
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML = '<div style="background:var(--ds-bg-elevated,#1e293b);border:1px solid var(--ds-border,rgba(255,255,255,0.1));border-radius:12px;padding:20px;max-width:400px;width:90%;">' +
                '<div style="font-weight:600;margin-bottom:8px;color:var(--ds-amber);"><i class="fas fa-exclamation-triangle"></i> Revertir Pago</div>' +
                '<div style="font-size:0.85rem;color:var(--ds-text-secondary);margin-bottom:12px;">' + label + '</div>' +
                '<div class="gm-form-group"><label>Razon (obligatoria)</label><input type="text" id="histReasonInput" class="ds-input" placeholder="Ej: Pago duplicado, error de monto..." maxlength="500" autofocus></div>' +
                '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
                '<button class="ds-btn ds-btn-secondary ds-btn-sm" id="histReasonCancel">Cancelar</button>' +
                '<button class="ds-btn ds-btn-sm" style="background:var(--ds-amber);color:#000;" id="histReasonConfirm">Revertir</button>' +
                '</div></div>';
            document.body.appendChild(overlay);
            var inp = document.getElementById('histReasonInput');
            document.getElementById('histReasonCancel').onclick = function() { document.body.removeChild(overlay); resolve(null); };
            document.getElementById('histReasonConfirm').onclick = function() {
                var v = (inp.value || '').trim();
                if (!v) { inp.style.borderColor = 'var(--ds-red)'; inp.focus(); return; }
                document.body.removeChild(overlay);
                resolve(v);
            };
            inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('histReasonConfirm').click(); if (e.key === 'Escape') document.getElementById('histReasonCancel').click(); });
            setTimeout(function() { inp.focus(); }, 100);
        });
    }

    async function aprobarSolicitud(userId, userName) {
        var ok = await showConfirm('Aprobar la solicitud de ' + userName + '?');
        if (!ok) return;
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members/' + encodeURIComponent(userId) + '/approve', {
                method: 'POST',
                headers: jsonHeaders()
            }).then(function(r) { return r.json(); });
            if (res.success) {
                showToast(userName + ' fue aprobado exitosamente', 'success');
                renderSolicitudes(document.getElementById('miembrosSubPanel'));
                // Refresh stats
                pendingJoinCount = Math.max(0, pendingJoinCount - 1);
                var badge = document.getElementById('solicitudesBadge');
                if (badge) { badge.textContent = pendingJoinCount; badge.style.display = pendingJoinCount > 0 ? 'inline-flex' : 'none'; }
            } else {
                showToast(res.error || 'Error al aprobar', 'error');
            }
        } catch (e) {
            showToast('Error de conexion', 'error');
        }
    }

    async function rechazarSolicitud(userId, userName) {
        // Show reject reason input
        var reason = prompt('Razon del rechazo (opcional):');
        if (reason === null) return; // cancelled
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members/' + encodeURIComponent(userId) + '/reject', {
                method: 'POST',
                headers: jsonHeaders(),
                body: JSON.stringify({ reason: reason || null })
            }).then(function(r) { return r.json(); });
            if (res.success) {
                showToast('Solicitud de ' + userName + ' rechazada', 'info');
                renderSolicitudes(document.getElementById('miembrosSubPanel'));
                pendingJoinCount = Math.max(0, pendingJoinCount - 1);
                var badge = document.getElementById('solicitudesBadge');
                if (badge) { badge.textContent = pendingJoinCount; badge.style.display = pendingJoinCount > 0 ? 'inline-flex' : 'none'; }
            } else {
                showToast(res.error || 'Error al rechazar', 'error');
            }
        } catch (e) {
            showToast('Error de conexion', 'error');
        }
    }

    async function solicitarId(userId, userName) {
        // Prompt for optional message
        var msg = prompt('Mensaje para ' + userName + ' (opcional, max 300 caracteres):');
        if (msg === null) return; // cancelled
        msg = (msg || '').substring(0, 300);

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members/' + encodeURIComponent(userId) + '/request-id', {
                method: 'POST',
                headers: jsonHeaders(),
                body: JSON.stringify({ message: msg || undefined })
            }).then(function(r) { return r.json(); });
            if (res.success) {
                showToast('Solicitud de verificacion enviada a ' + userName, 'success');
                // Refresh solicitudes panel
                var subpanel = document.querySelector('.gm-subpanel');
                if (subpanel && subpanel.parentElement) renderSolicitudes(subpanel.parentElement);
            } else {
                showToast(res.error || 'Error al enviar solicitud', 'error');
            }
        } catch (e) {
            showToast('Error de conexion', 'error');
        }
    }

    async function removeMemberFromGroup(userId, userName) {
        var reason = await histAskReason('Remover a ' + userName + ' del grupo. Esta accion cancelara pagos pendientes y marcara sus turnos como vacantes.');
        if (reason === null) return;
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members/' + encodeURIComponent(userId), {
                method: 'DELETE', headers: jsonHeaders(),
                body: JSON.stringify({ reason: reason })

    // -- Anomaly Flags --
    async function renderAnomalyFlags(container) {
        container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Alertas de Pago</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i></div></div>';

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/anomaly-flags', { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error('');
            var flags = data.data.flags || data.data || [];
            var activeCount = data.data.active_count || flags.filter(function(f) { return !f.resolved_at; }).length;
            var resolvedCount = data.data.resolved_count || flags.filter(function(f) { return f.resolved_at; }).length;

            var typeLabels = { consecutive_late: 'Pagos consecutivos tarde', deterioration: 'Deterioro de puntualidad', pay_and_disappear: 'Paga y desaparece', phantom_payments: 'Pagos fantasma', rapid_join_collect_leave: 'Ingreso-cobro-salida rapido' };
            var typeIcons = { consecutive_late: 'fa-clock', deterioration: 'fa-chart-line', pay_and_disappear: 'fa-ghost', phantom_payments: 'fa-eye-slash', rapid_join_collect_leave: 'fa-running' };

            var html = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Alertas de Pago</h3><div style="display:flex;gap:6px;"><button class="gm-print-icon" data-action="print-anomalies" title="Imprimir"><i class="fas fa-print"></i></button><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div></div>';

            // Summary
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';
            html += '<div class="ds-card" style="padding:10px;text-align:center;border-left:3px solid var(--ds-red);"><div style="font-size:1.3rem;font-weight:700;color:var(--ds-red);">' + activeCount + '</div><div class="gm-stat-label">Activas</div></div>';
            html += '<div class="ds-card" style="padding:10px;text-align:center;border-left:3px solid var(--ds-green);"><div style="font-size:1.3rem;font-weight:700;color:var(--ds-green);">' + resolvedCount + '</div><div class="gm-stat-label">Resueltas</div></div>';
            html += '</div>';

            // Filter tabs
            if (flags.length > 0) {
                html += '<div style="display:flex;gap:4px;margin-bottom:12px;">';
                html += '<button class="ds-btn ds-btn-sm af-filter" data-val="all" style="background:var(--ds-cyan-muted);color:var(--ds-cyan);border:none;">Todas (' + flags.length + ')</button>';
                if (activeCount > 0) html += '<button class="ds-btn ds-btn-sm af-filter" data-val="active" style="background:var(--ds-red-muted);color:var(--ds-red);border:none;">Activas (' + activeCount + ')</button>';
                if (resolvedCount > 0) html += '<button class="ds-btn ds-btn-sm af-filter" data-val="resolved" style="background:rgba(100,116,139,0.15);color:var(--ds-text-muted);border:none;">Resueltas (' + resolvedCount + ')</button>';
                html += '</div>';
            }

            html += '<div id="afList">';
            if (flags.length === 0) {
                html += '<div class="gm-empty"><i class="fas fa-check-circle" style="color:var(--ds-green);font-size:2rem;"></i><p>Sin alertas de pago</p></div>';
            } else {
                for (var i = 0; i < flags.length; i++) {
                    var f = flags[i];
                    var isActive = !f.resolved_at;
                    var sevColor = f.severity === 'danger' ? 'var(--ds-red)' : 'var(--ds-amber)';
                    var icon = typeIcons[f.flag_type] || 'fa-exclamation-triangle';
                    var label = typeLabels[f.flag_type] || f.flag_type || 'Alerta';
                    var sevLabel = f.severity === 'danger' ? 'Peligro' : 'Advertencia';
                    var filterClass = isActive ? 'active' : 'resolved';
                    var initial = (f.user_name || 'M').charAt(0).toUpperCase();
                    var avatarHtml = f.user_avatar
                        ? '<img src="' + esc(f.user_avatar) + '" style="width:34px;height:34px;border-radius:50%;object-fit:cover;">'
                        : '<div style="width:34px;height:34px;border-radius:50%;background:' + sevColor + ';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.8rem;">' + initial + '</div>';

                    html += '<div class="af-item" data-filter="' + filterClass + '" style="display:flex;gap:10px;padding:12px;margin-bottom:8px;border-left:3px solid ' + sevColor + ';background:var(--ds-bg-elevated);border-radius:0 8px 8px 0;' + (isActive ? '' : 'opacity:0.55;') + '">';
                    html += avatarHtml;
                    html += '<div style="flex:1;min-width:0;">';

                    // Header: name + severity badge
                    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">';
                    html += '<span style="font-weight:600;">' + esc(f.user_name || 'Miembro') + '</span>';
                    html += '<span style="font-size:0.6rem;padding:1px 6px;border-radius:6px;background:' + sevColor + ';color:#fff;">' + sevLabel + '</span>';
                    if (!isActive) html += '<span style="font-size:0.6rem;padding:1px 6px;border-radius:6px;background:var(--ds-green-muted);color:var(--ds-green);">Resuelto</span>';
                    html += '</div>';

                    // Type label with icon
                    html += '<div style="font-size:0.8rem;color:var(--ds-text-secondary);margin-bottom:3px;"><i class="fas ' + icon + '" style="color:' + sevColor + ';font-size:0.7rem;width:14px;"></i> ' + label + '</div>';

                    // Details from JSONB
                    var details = f.details || {};
                    var detailLines = [];
                    if (details.recent_avg_delay != null && details.historical_avg_delay != null) {
                        detailLines.push('Retraso reciente: ' + Math.round(details.recent_avg_delay) + ' dias (historico: ' + Math.round(details.historical_avg_delay) + ' dias)');
                    }
                    if (details.deterioration_days != null) detailLines.push('Deterioro: ' + Math.round(details.deterioration_days) + ' dias');
                    if (details.pre_collection_rate != null && details.post_collection_rate != null) {
                        detailLines.push('Tasa pre-cobro: ' + details.pre_collection_rate + '% → post-cobro: ' + details.post_collection_rate + '%');
                    }
                    if (details.days_as_member != null) detailLines.push('Dias como miembro: ' + details.days_as_member);
                    if (details.amount_collected != null) detailLines.push('Monto cobrado: L. ' + fmt(details.amount_collected));
                    if (details.manual_percentage != null) detailLines.push('Pagos manuales: ' + details.manual_percentage + '%');
                    if (details.consecutive_late_count != null) detailLines.push('Pagos tarde consecutivos: ' + details.consecutive_late_count);

                    if (detailLines.length > 0) {
                        html += '<div style="font-size:0.72rem;color:var(--ds-text-faint);margin-bottom:3px;">';
                        for (var dl = 0; dl < detailLines.length; dl++) {
                            html += detailLines[dl] + (dl < detailLines.length - 1 ? ' &middot; ' : '');
                        }
                        html += '</div>';
                    }

                    // Dates
                    html += '<div style="font-size:0.68rem;color:var(--ds-text-faint);">';
                    if (f.created_at) {
                        var created = new Date(f.created_at);
                        var daysAgo = Math.floor((Date.now() - created.getTime()) / 86400000);
                        html += 'Detectada: ' + created.toLocaleDateString('es-HN', {day:'numeric',month:'short',year:'numeric'});
                        if (isActive && daysAgo > 0) html += ' (' + daysAgo + 'd)';
                    }
                    if (f.resolved_at) html += ' &middot; Resuelta: ' + new Date(f.resolved_at).toLocaleDateString('es-HN', {day:'numeric',month:'short',year:'numeric'});
                    html += '</div>';

                    html += '</div>'; // end info

                    // Actions for active flags
                    if (isActive) {
                        html += '<div style="flex-shrink:0;display:flex;flex-direction:column;gap:4px;">';
                        html += '<button class="ds-btn ds-btn-sm" style="background:var(--ds-green-muted);color:var(--ds-green);border:1px solid var(--ds-green-muted);font-size:0.7rem;" data-action="af-resolve" data-fid="' + esc(f.id) + '" data-name="' + esc(f.user_name) + '"><i class="fas fa-check"></i></button>';
                        html += '</div>';
                    }

                    html += '</div>'; // end card
                }
            }
            html += '</div></div>';
            container.innerHTML = html;

            // Wire filter tabs
            container.querySelectorAll('.af-filter').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var val = this.getAttribute('data-val');
                    container.querySelectorAll('.af-item').forEach(function(item) {
                        item.style.display = val === 'all' ? '' : (item.getAttribute('data-filter') === val ? '' : 'none');
                    });
                    container.querySelectorAll('.af-filter').forEach(function(b) { b.style.opacity = '0.5'; });
                    this.style.opacity = '1';
                });
            });

        } catch(e) {
            container.innerHTML = '<div class="gm-error">Error al cargar alertas</div>';
        }
    }

    // -- Gestionar Turnos (full inline panel with drag-drop) --
    var turnsMembers = [];
    var turnsExpandedList = [];

    async function renderTurnsPanel(container) {
        container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Gestionar Turnos</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando turnos...</div></div>';

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/members', { headers: authHeaders() });
            var result = await res.json();
            if (!result.success) throw new Error('Error al cargar miembros');

            var membersRaw = result.data?.members || result.members || [];
            turnsMembers = membersRaw.map(function(m) {
                m.turn_locked = m.turn_locked || false;
                m.num_positions = parseInt(m.num_positions) || 1;
                return m;
            }).sort(function(a, b) { return (a.turn_position || 999) - (b.turn_position || 999); });

            // Build expanded turns
            var expandedOrder = result.data?.expanded_order || result.expanded_order;
            if (expandedOrder && expandedOrder.length > 0) {
                var memberMap = {};
                turnsMembers.forEach(function(m) { memberMap[m.user_id] = m; });
                turnsExpandedList = expandedOrder.map(function(pos) {
                    var member = memberMap[pos.user_id];
                    var posLocks = member ? (member.position_locks || []) : [];
                    var lockInfo = posLocks[pos.slot] || {};
                    return {
                        user_id: pos.user_id, name: member ? member.name : 'Usuario',
                        role: member ? member.role : 'member', slot_index: pos.slot || 0,
                        total_slots: member ? member.num_positions : 1,
                        turn_locked: lockInfo.locked === true, original_member: member
                    };
                });
            } else {
                // Fallback: expand from members
                turnsExpandedList = [];
                turnsMembers.forEach(function(m) {
                    for (var s = 0; s < m.num_positions; s++) {
                        turnsExpandedList.push({
                            user_id: m.user_id, name: m.name || 'Usuario',
                            role: m.role || 'member', slot_index: s,
                            total_slots: m.num_positions, turn_locked: m.turn_locked || false,
                            original_member: m
                        });
                    }
                });
            }

            renderTurnsContent(container);
        } catch(e) {
            container.innerHTML = '<div class="gm-error">' + esc(e.message) + '</div>';
        }
    }

        // Help text
        html += '<div style="font-size:0.78rem;color:var(--ds-text-muted);margin-bottom:12px;">Arrastra o usa las flechas para reordenar. <span style="color:var(--ds-green);">🔒</span> = posicion anclada.</div>';

        html += '<div id="gmTurnsList" style="display:flex;flex-direction:column;gap:6px;">';

                '<div style="flex:1;min-width:0;"><div style="font-weight:500;">' + displayName + phBadge + '</div>' +
                '<div style="font-size:0.72rem;color:var(--ds-text-faint);">' + ((pos.role === 'creator') ? 'Creador' : 'Miembro') + (isLocked ? ' &middot; Anclado' : '') + '</div></div>' +
                // Lock toggle

                '<button data-action="turns-remove-pos" data-uid="' + esc(pos.user_id) + '" data-slot="' + pos.slot_index + '" class="gm-turn-btn-sm" style="background:' + (pos.total_slots > 1 ? 'var(--ds-red)' : 'var(--ds-bg-elevated)') + ';opacity:' + (pos.total_slots > 1 ? '1' : '0.3') + ';"' + (pos.total_slots > 1 ? '' : ' disabled') + '>-</button>' +
                '<span style="min-width:18px;text-align:center;color:var(--ds-amber);font-weight:700;font-size:0.8rem;">' + pos.total_slots + '</span>' +
                '<button data-action="turns-add-pos" data-uid="' + esc(pos.user_id) + '" class="gm-turn-btn-sm" style="background:var(--ds-green);">+</button>' +
                '</div>' +
                // Move up/down
                '<div style="display:flex;gap:3px;">' +
                '<button data-action="turns-move-up" data-tidx="' + index + '" class="gm-turn-btn"' + (isLocked || index === 0 ? ' disabled style="opacity:0.3;"' : '') + '><i class="fas fa-chevron-up" style="font-size:0.7rem;"></i></button>' +
                '<button data-action="turns-move-down" data-tidx="' + index + '" class="gm-turn-btn"' + (isLocked || index === displayList.length - 1 ? ' disabled style="opacity:0.3;"' : '') + '><i class="fas fa-chevron-down" style="font-size:0.7rem;"></i></button>' +
                '</div>' +

                (pos.slot_index === 0 ? '<button data-action="turns-remove-member" data-uid="' + esc(pos.user_id) + '" class="gm-turn-btn" style="background:var(--ds-red);color:#fff;" title="Quitar"><i class="fas fa-times" style="font-size:0.7rem;"></i></button>' : '') +
            '</div>';

        // Unassigned members

        if (unassigned.length > 0) {
            html += '<div style="margin-top:14px;padding:12px;background:var(--ds-amber-muted);border:1px solid rgba(245,158,11,0.2);border-radius:10px;">';
            html += '<div style="font-size:0.82rem;font-weight:600;color:var(--ds-amber);margin-bottom:8px;">Sin turno asignado (' + unassigned.length + ')</div>';
            unassigned.forEach(function(m) {
                html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;"><span style="flex:1;font-weight:500;">' + esc(m.name || 'Usuario') + ' <span style="font-size:0.72rem;color:var(--ds-text-faint);">' + m.num_positions + ' pos.</span></span>' +
                    '<button data-action="turns-add-member" data-uid="' + esc(m.user_id) + '" class="ds-btn ds-btn-sm" style="background:var(--ds-amber);color:#000;">Agregar</button></div>';
            });
            html += '</div>';
        }

        // Save button
        html += '<div style="margin-top:14px;display:flex;gap:10px;">';
        html += '<button class="ds-btn ds-btn-secondary" data-action="close-subpanel" style="flex:1;">Cancelar</button>';
        html += '<button class="ds-btn ds-btn-primary" data-action="turns-save" style="flex:1;" id="gmTurnsSaveBtn"><i class="fas fa-save"></i> Guardar Orden</button>';
        html += '</div></div>';

        container.innerHTML = html;

        // Init drag-and-drop
        initTurnsDragDrop();
    }

    function initTurnsDragDrop() {
        var items = document.querySelectorAll('.gm-turn-item');
        var draggedItem = null;

        // Desktop drag-and-drop
        items.forEach(function(item) {
            item.addEventListener('dragstart', function(e) {
                if (this.dataset.locked === 'true') { e.preventDefault(); return; }
                draggedItem = this;
                this.style.opacity = '0.4';
                e.dataTransfer.effectAllowed = 'move';
            });
            item.addEventListener('dragend', function() { this.style.opacity = '1'; draggedItem = null; });
            item.addEventListener('dragover', function(e) {
                e.preventDefault();
                if (this.dataset.locked !== 'true') this.style.borderColor = 'var(--ds-amber)';
            });
            item.addEventListener('dragleave', function() {
                this.style.borderColor = this.dataset.locked === 'true' ? 'var(--ds-green)' : 'var(--ds-border-subtle,rgba(255,255,255,0.06))';
            });
            item.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '';
                if (!draggedItem || draggedItem === this) return;
                var from = parseInt(draggedItem.dataset.index);
                var to = parseInt(this.dataset.index);
                if (turnsExpandedList[from].turn_locked || turnsExpandedList[to].turn_locked) return;
                var moved = turnsExpandedList.splice(from, 1)[0];
                turnsExpandedList.splice(to, 0, moved);
                renderTurnsContent(document.getElementById('miembrosSubPanel'));
            });
        });

        // Touch drag-and-drop (mobile)
        var touchDragged = null;
        var touchStartY = 0;
        items.forEach(function(item) {
            item.addEventListener('touchstart', function(e) {
                if (this.dataset.locked === 'true') return;
                touchDragged = this;
                touchStartY = e.touches[0].clientY;
                this.style.opacity = '0.5';
                this.style.zIndex = '10';
            }, { passive: true });
        });
        document.addEventListener('touchmove', function(e) {
            if (!touchDragged) return;
            var deltaY = e.touches[0].clientY - touchStartY;
            touchDragged.style.transform = 'translateY(' + deltaY + 'px)';
        }, { passive: true });
        document.addEventListener('touchend', function(e) {
            if (!touchDragged) return;
            touchDragged.style.opacity = '1';
            touchDragged.style.transform = '';
            touchDragged.style.zIndex = '';
            var fromIdx = parseInt(touchDragged.dataset.index);
            // Determine target based on final Y position
            var rect = touchDragged.getBoundingClientRect();
            var centerY = rect.top + rect.height / 2;
            var allItems = document.querySelectorAll('.gm-turn-item');
            var toIdx = fromIdx;
            allItems.forEach(function(it) {
                if (it === touchDragged) return;
                var r = it.getBoundingClientRect();
                if (centerY > r.top && centerY < r.bottom) toIdx = parseInt(it.dataset.index);
            });
            if (toIdx !== fromIdx && !turnsExpandedList[fromIdx].turn_locked && !turnsExpandedList[toIdx].turn_locked) {
                var moved = turnsExpandedList.splice(fromIdx, 1)[0];
                turnsExpandedList.splice(toIdx, 0, moved);
                renderTurnsContent(document.getElementById('miembrosSubPanel'));
            }
            touchDragged = null;
        });
    }

    function turnsToggleLock(idx) {
        if (idx < 0 || idx >= turnsExpandedList.length) return;
        turnsExpandedList[idx].turn_locked = !turnsExpandedList[idx].turn_locked;
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    function turnsMoveUp(idx) {
        if (idx <= 0 || turnsExpandedList[idx].turn_locked || turnsExpandedList[idx - 1].turn_locked) return;
        var tmp = turnsExpandedList[idx];
        turnsExpandedList[idx] = turnsExpandedList[idx - 1];
        turnsExpandedList[idx - 1] = tmp;
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    function turnsMoveDown(idx) {
        if (idx >= turnsExpandedList.length - 1 || turnsExpandedList[idx].turn_locked || turnsExpandedList[idx + 1].turn_locked) return;
        var tmp = turnsExpandedList[idx];
        turnsExpandedList[idx] = turnsExpandedList[idx + 1];
        turnsExpandedList[idx + 1] = tmp;
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    function turnsAddMember(userId) {
        var member = turnsMembers.find(function(m) { return m.user_id === userId; });
        if (!member) return;
        for (var s = 0; s < member.num_positions; s++) {
            turnsExpandedList.push({
                user_id: member.user_id, name: member.name || 'Usuario',
                role: member.role || 'member', slot_index: s,
                total_slots: member.num_positions, turn_locked: false, original_member: member
            });
        }
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    async function turnsRemoveMember(userId) {
        var member = turnsMembers.find(function(m) { return m.user_id === userId; });
        var name = member ? member.name : 'este miembro';
        var ok = await showConfirm('Quitar a ' + name + ' de los turnos?');
        if (!ok) return;
        turnsExpandedList = turnsExpandedList.filter(function(p) { return p.user_id !== userId; });
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    function turnsAddPosition(userId) {
        // Find last slot for this user, add one more (max 10)
        var lastIdx = -1;
        var currentSlots = 0;
        turnsExpandedList.forEach(function(p, i) { if (p.user_id === userId) { lastIdx = i; currentSlots++; } });
        if (lastIdx < 0) return;
        if (currentSlots >= 10) { showToast('Maximo 10 posiciones por miembro', 'error'); return; }
        var member = turnsMembers.find(function(m) { return m.user_id === userId; });
        turnsExpandedList.splice(lastIdx + 1, 0, {
            user_id: userId, name: member ? member.name : 'Usuario',
            role: member ? member.role : 'member', slot_index: currentSlots,
            total_slots: currentSlots + 1, turn_locked: false, original_member: member
        });
        // Update total_slots for all entries of this user
        var newTotal = currentSlots + 1;
        turnsExpandedList.forEach(function(p) { if (p.user_id === userId) p.total_slots = newTotal; });
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    function turnsRemovePosition(userId, slotIndex) {
        // Remove one slot, update totals
        var removed = false;
        turnsExpandedList = turnsExpandedList.filter(function(p) {
            if (!removed && p.user_id === userId && p.slot_index === slotIndex) { removed = true; return false; }
            return true;
        });
        // Recalc slot indices and total
        var count = 0;
        turnsExpandedList.forEach(function(p) { if (p.user_id === userId) { p.slot_index = count; count++; } });
        turnsExpandedList.forEach(function(p) { if (p.user_id === userId) p.total_slots = count; });
        renderTurnsContent(document.getElementById('miembrosSubPanel'));
    }

    async function turnsSave() {
        var ok = await showConfirm('Guardar el nuevo orden de turnos? Se notificara a los miembros.');
        if (!ok) return;
        var btn = document.getElementById('gmTurnsSaveBtn');
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...'; }
        try {
            // Collapse to member format, preserving per-slot lock state
            var seenUsers = {};
            var memberTurns = [];
            turnsExpandedList.forEach(function(pos) {
                if (!seenUsers[pos.user_id]) {
                    seenUsers[pos.user_id] = true;
                    // Collect all slots for this user
                    var userSlots = turnsExpandedList.filter(function(p) { return p.user_id === pos.user_id; });
                    var posLocks = userSlots.map(function(s) { return { locked: s.turn_locked }; });
                    var anyLocked = userSlots.some(function(s) { return s.turn_locked; });
                    memberTurns.push({
                        user_id: pos.user_id, new_position: memberTurns.length + 1,
                        turn_locked: anyLocked, num_positions: userSlots.length,
                        position_locks: posLocks
                    });
                }
            });

            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/reorder-turns', {
                method: 'PUT', headers: jsonHeaders(),
                body: JSON.stringify({ member_turns: memberTurns, expanded_turns: turnsExpandedList })
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error al guardar');
            showToast('Turnos actualizados', 'success');
            // Reload to show saved state
            renderTurnsPanel(document.getElementById('miembrosSubPanel'));
        } catch(e) {
            showToast(e.message, 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Guardar Orden'; }
        }
    }

    async function saveEditGroup() {
        var body = {
            name: document.getElementById('egName').value.trim(),
            description: document.getElementById('egDesc').value.trim(),
            contribution_amount: parseFloat(document.getElementById('egAmount').value),
            frequency: document.getElementById('egFreq').value,
            max_members: parseInt(document.getElementById('egMax').value),
            advance_threshold: parseInt(document.getElementById('egThreshold').value),
            location: document.getElementById('egLocation').value.trim()
        };
        if (!body.name) { showToast('Nombre requerido', 'error'); return; }
        // H1: Warn about dangerous changes on active tanda
        var warnings = [];
        if (body.contribution_amount !== parseFloat(groupData.contribution_amount)) warnings.push('Monto de aporte (L.' + groupData.contribution_amount + ' → L.' + body.contribution_amount + ')');
        if (body.max_members !== parseInt(groupData.max_members)) warnings.push('Max miembros (' + groupData.max_members + ' → ' + body.max_members + ')');
        if (body.frequency !== groupData.frequency) warnings.push('Frecuencia (' + groupData.frequency + ' → ' + body.frequency + ')');
        if (warnings.length > 0) {
            var ok = await showConfirm('Atencion: Vas a cambiar valores que afectan los calculos financieros:\n\n' + warnings.join('\n') + '\n\nEsto puede afectar pagos pendientes y distribuciones. Continuar?');
            if (!ok) return;
        }
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/update', {
                method: 'PUT', headers: jsonHeaders(), body: JSON.stringify(body)
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            showToast('Grupo actualizado', 'success');
            groupData.name = body.name;
            groupData.contribution_amount = body.contribution_amount;
            groupData.frequency = body.frequency;
            groupData.max_members = body.max_members;
            document.getElementById('gmGroupName').textContent = body.name;
        } catch(e) { showToast(e.message, 'error'); }
    }

    async function renderLoanConfig(container) {
        container.innerHTML = '<div class="gm-subpanel"><div class="gm-subpanel-header"><h3>Configuracion de Prestamos</h3><button class="gm-subpanel-close" data-action="close-subpanel"><i class="fas fa-times"></i></button></div><div class="gm-loading"><i class="fas fa-spinner fa-spin"></i></div></div>';

            ]);

            var cfg = loansRes.data.config || {};

            var activeLoans = loans.filter(function(l) { return l.status === 'active' || l.status === 'paying'; });
            var totalDebt = loansRes.data.total_active_debt || 0;

            var rate = cfg.mora_interest_rate != null ? cfg.mora_interest_rate : 5;
            var grace = cfg.loan_grace_days != null ? cfg.loan_grace_days : 7;
            var maxMora = cfg.max_mora_cycles != null ? cfg.max_mora_cycles : 3;

            html += '<div class="gm-form-group">';
            html += '<label>Tasa de interes anual (%)</label>';
            html += '<input type="number" id="lcRate" class="ds-input" value="' + rate + '" min="0" max="20" step="0.5">';
            html += '<div style="font-size:0.7rem;color:var(--ds-text-faint);margin-top:3px;">Interes que se acumula diariamente sobre el saldo pendiente del prestamo despues del periodo de gracia. Rango: 0% (sin interes) a 20%. <span style="color:var(--ds-cyan);">Actual: ' + rate + '%</span></div>';
            html += '</div>';

            // Grace days
            html += '<div class="gm-form-group">';
            html += '<label>Dias de gracia</label>';
            html += '<input type="number" id="lcGrace" class="ds-input" value="' + grace + '" min="0" max="30">';
            html += '<div style="font-size:0.7rem;color:var(--ds-text-faint);margin-top:3px;">Dias que el miembro tiene para pagar antes de que el prestamo empiece a generar intereses. Rango: 0 a 30 dias. <span style="color:var(--ds-cyan);">Actual: ' + grace + ' dias</span></div>';
            html += '</div>';

    async function saveLoanConfig() {
        var rateVal = parseFloat(document.getElementById('lcRate').value);
        var graceVal = parseInt(document.getElementById('lcGrace').value);
        var moraVal = parseInt(document.getElementById('lcMaxMora').value);

        // H3: Client-side validation matching API limits
        if (isNaN(rateVal) || rateVal < 0 || rateVal > 20) { showToast('Tasa debe ser entre 0% y 20%', 'error'); return; }
        if (isNaN(graceVal) || graceVal < 0 || graceVal > 30) { showToast('Dias de gracia debe ser entre 0 y 30', 'error'); return; }
        if (isNaN(moraVal) || moraVal < 2 || moraVal > 12) { showToast('Ciclos maximos debe ser entre 2 y 12', 'error'); return; }

        var btn = document.getElementById('lcSaveBtn');
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...'; }

        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/loans/config', {
                method: 'PUT', headers: jsonHeaders(),
                body: JSON.stringify({ mora_interest_rate: rateVal, loan_grace_days: graceVal, max_mora_cycles: moraVal })
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            showToast('Configuracion guardada', 'success');
            // Refresh to show updated "Actual:" values
            renderLoanConfig(document.getElementById('configSubPanel'));
        } catch(e) {
            showToast(e.message, 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Guardar Configuracion'; }
        }
    }

    
    // -- Exports --
    async function exportData(type, format) {
        // H4: Show loading on the button
        var btnMap = { 'members-pdf': 'btnExpMPdf', 'members-csv': 'btnExpMCsv', 'payments-pdf': 'btnExpPPdf', 'payments-csv': 'btnExpPCsv' };
        var btnEl = document.getElementById(btnMap[type + '-' + format] || '');
        var originalHtml = btnEl ? btnEl.innerHTML : '';
        if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Exportando...'; }
        try {
            var url = API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/export/' + type + '?format=' + format;
            var res = await fetch(url, { headers: authHeaders() });
            if (!res.ok) throw new Error('Error al exportar');
            var blob = await res.blob();
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (groupData.name || 'grupo') + '-' + type + '.' + format;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('Exportacion completada', 'success');
        } catch(e) { showToast(e.message, 'error'); }
        if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = originalHtml; }
    }

    // -- Pause/Resume --
    async function togglePause() {
        var ok = await showConfirm('Pausar o reanudar la tanda de este grupo?');
        if (!ok) return;
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/toggle-pause', {
                method: 'PUT', headers: jsonHeaders()
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            showToast(data.data.paused ? 'Tanda pausada' : 'Tanda reanudada', 'success');

    // -- Delete Group --
    async function deleteGroup() {
        // M2: Double confirm — require typing group name
        var groupName = groupData.name || 'Grupo';
        var typed = prompt('Para eliminar este grupo permanentemente, escribe el nombre del grupo:\n\n' + groupName);
        if (!typed || typed.trim() !== groupName) {
            if (typed !== null) showToast('El nombre no coincide', 'error');
            return;
        }
        var ok = await showConfirm('ULTIMA CONFIRMACION: Eliminar "' + groupName + '" permanentemente? Se perderan todos los datos de pagos, turnos y prestamos.');
        if (!ok) return;
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId), {
                method: 'DELETE', headers: jsonHeaders()
            });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            showToast('Grupo eliminado', 'success');
            setTimeout(function() { window.location.href = '/groups-advanced-system.html'; }, 1500);
        } catch(e) { showToast(e.message, 'error'); }
    }

    function switchToTab(name) {
        document.querySelectorAll('.gm-tab').forEach(function(t) { t.classList.remove('active'); });
        var target = document.querySelector('.gm-tab[data-tab="' + name + '"]');
        if (target) target.classList.add('active');
        document.querySelectorAll('.gm-panel').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById('panel-' + name).classList.add('active');
        currentTab = name;
        loadTab(name);
    }

    async function loadDisbursements() {
        var panel = document.getElementById('pagosSubPanel');
        if (!panel) return;
        panel.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ds-text-faint);"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>';
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/disbursements', { headers: authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            var reqs = data.data?.requests || [];
            var html = '<div class="gm-section"><div class="gm-section-title">Solicitudes (' + reqs.length + ')</div>';
            if (!reqs.length) { html += '<p style="color:var(--ds-text-faint);padding:12px;">No hay solicitudes.</p>'; }
            reqs.forEach(function(r) {
                var sc = r.status === 'pending' ? 'var(--ds-amber)' : r.status === 'approved' ? 'var(--ds-green)' : r.status === 'fulfilled' ? 'var(--ds-cyan)' : 'var(--ds-red)';
                var sl = { pending:'Pendiente', approved:'Aprobada', rejected:'Rechazada', fulfilled:'Desembolsada', cancelled:'Cancelada' }[r.status] || r.status;
                html += '<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid ' + sc + ';">';
                html += '<div style="display:flex;justify-content:space-between;"><strong>' + esc(r.requester_name) + '</strong><span style="color:' + sc + ';font-size:0.75rem;font-weight:600;">' + sl + '</span></div>';
                html += '<div style="font-size:0.85rem;margin-top:4px;">L.' + parseFloat(r.amount).toLocaleString('es-HN') + ' — ' + esc(r.reason) + '</div>';
                html += '<div style="font-size:0.7rem;color:var(--ds-text-faint);margin-top:4px;">Votos: ' + r.votes_for + ' a favor, ' + r.votes_against + ' en contra</div>';
                if (r.status === 'approved' && isCreatorOrCoord) {
                    html += '<button class="gm-action-btn gm-action-green" style="margin-top:8px;padding:6px 16px;font-size:0.75rem;" data-action="disb-fulfill" data-rid="' + r.id + '"><i class="fas fa-check"></i> Desembolsar</button>';
                }
                if (r.status === 'pending' && !r.my_vote) {
                    html += '<div style="margin-top:8px;display:flex;gap:8px;">';
                    html += '<button class="gm-action-btn gm-action-green" style="padding:6px 12px;font-size:0.75rem;" data-action="disb-vote" data-rid="' + r.id + '" data-vote="approve"><i class="fas fa-thumbs-up"></i> Aprobar</button>';
                    html += '<button class="gm-action-btn" style="padding:6px 12px;font-size:0.75rem;border-color:var(--ds-red);color:var(--ds-red);" data-action="disb-vote" data-rid="' + r.id + '" data-vote="reject"><i class="fas fa-thumbs-down"></i> Rechazar</button></div>';
                } else if (r.my_vote) { html += '<div style="font-size:0.7rem;color:var(--ds-text-faint);margin-top:4px;">Tu voto: ' + (r.my_vote === 'approve' ? 'A favor' : 'En contra') + '</div>'; }
                html += '</div>';
            });
            html += '</div>';
            panel.innerHTML = html;
        } catch(e) { panel.innerHTML = '<div style="color:var(--ds-red);padding:12px;">' + esc(e.message) + '</div>'; }
    }

    async function promptInvestBuy() {
        var amount = prompt('Monto a invertir (L.):');
        if (!amount || parseFloat(amount) <= 0) return;
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/invest', { method:'POST', headers:authHeaders(), body:JSON.stringify({amount:parseFloat(amount)}) });
            var data = await res.json();
            if (data.success) { if (window.showToast) showToast('Inversion: ' + (data.data.shares_purchased||0).toFixed(2) + ' acciones', 'success'); loadPagos(); }
            else alert(data.data?.error?.message || 'Error');
        } catch(e) { alert(e.message); }
    }

    async function promptNavUpdate() {
        var nav = prompt('Nuevo NAV por accion (L.):', groupData?.nav_per_share || 100);
        if (!nav || parseFloat(nav) <= 0) return;
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/investment/update-nav', { method:'POST', headers:authHeaders(), body:JSON.stringify({nav:parseFloat(nav)}) });
            var data = await res.json();
            if (data.success) { groupData.nav_per_share = parseFloat(nav); if (window.showToast) showToast('NAV actualizado', 'success'); loadPagos(); }
            else alert(data.data?.error?.message || 'Error');
        } catch(e) { alert(e.message); }
    }

    async function loadInvestDashboard() {
        var panel = document.getElementById('pagosSubPanel');
        if (!panel) return;
        panel.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i></div>';
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/investment', { headers:authHeaders() });
            var data = await res.json();
            if (!data.success) throw new Error(data.data?.error?.message || 'Error');
            var d = data.data;
            var html = '<div class="gm-section"><div class="gm-section-title">Accionistas</div>';
            (d.members || []).forEach(function(m) {
                html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);"><span>' + esc(m.name) + '</span><span style="color:var(--ds-cyan);">' + m.shares.toFixed(1) + ' acc (L.' + m.value.toLocaleString('es-HN',{maximumFractionDigits:0}) + ')</span></div>';
            });
            html += '</div>';
            panel.innerHTML = html;
        } catch(e) { panel.innerHTML = '<div style="color:var(--ds-red);padding:12px;">' + esc(e.message) + '</div>'; }
    }

    async function dissolveClub() {
        try {
            var res = await fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/investment/dissolve', { method:'POST', headers:authHeaders() });
            var data = await res.json();
            if (data.success) { if (window.showToast) showToast('Club disuelto', 'success'); setTimeout(function(){ location.reload(); }, 1500); }
            else alert(data.data?.error?.message || 'Error');
        } catch(e) { alert(e.message); }
    }

    // Delegated handlers for disbursement actions
    document.addEventListener('click', function(ev) {
        var btn = ev.target.closest('[data-action]');
        if (!btn) return;
        var act = btn.getAttribute('data-action');
        if (act === 'disb-fulfill') {
            var rid = btn.getAttribute('data-rid');
            if (!rid || !confirm('Confirmar desembolso?')) return;
            fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/disbursements/' + rid + '/fulfill', { method:'POST', headers:authHeaders() })
                .then(function(r){return r.json();}).then(function(d){if(d.success){showToast && showToast('Desembolsado','success');loadDisbursements();}else{alert(d.data?.error?.message||'Error');}}).catch(function(e){alert(e.message);});
        } else if (act === 'disb-vote') {
            var rid2 = btn.getAttribute('data-rid'), vote = btn.getAttribute('data-vote');
            fetch(API_BASE + '/api/groups/' + encodeURIComponent(groupId) + '/disbursements/' + rid2 + '/vote', { method:'POST', headers:authHeaders(), body:JSON.stringify({vote:vote}) })
                .then(function(r){return r.json();}).then(function(d){if(d.success){showToast && showToast('Voto registrado','success');loadDisbursements();}else{alert(d.data?.error?.message||'Error');}}).catch(function(e){alert(e.message);});
        }
    });

    init();

})();
</script>
