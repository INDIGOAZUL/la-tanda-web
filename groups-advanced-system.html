<!-- PATCH: Accessibility fixes — manual review recommended before merge -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Tanda - Grupos</title>
  <style>
    body { font-family: sans-serif; color: #333; background: #fff; }
    .group-card { border: 1px solid #ddd; padding: 12px; margin: 8px; }
    .group-card img { max-width: 100%; height: auto; }
    button { background: #0056b3; color: #fff; border: none; padding: 8px 16px; cursor: pointer; }
    button:hover { background: #004494; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link" style="position:absolute;top:-40px;left:0;background:#000;color:#fff;padding:8px;z-index:100;transition:top 0.3s;">Saltar al contenido principal</a>
  <main id="main-content">
    <h1>Mis Grupos</h1>
    <div class="group-card">
      <img src="group-photo1.jpg" alt="Foto del grupo Vecinos Activos">
      <h2>Vecinos Activos</h2>
      <p>Descripcion del grupo...</p>
      <button aria-label="Unirse a Vecinos Activos">Unirse</button>
    </div>
    <div class="group-card">
      <img src="group-photo2.jpg" alt="Foto del grupo Deportes">
      <h2>Deportes</h2>
      <p>Descripcion del grupo...</p>
      <button aria-label="Unirse a Deportes">Unirse</button>
    </div>
  </main>
</body>
</html>
