<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Notificaciones - La Tanda</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Base styles -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/notificaciones-historial.css">
</head>
<body class="dark-theme">
    <!-- Navbar -->
    <header class="main-header">
        <div class="logo">
            <a href="home-dashboard.html"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
        <div class="header-title">Historial de Notificaciones</div>
        <div class="header-actions">
            <!-- Reuse standard header actions -->
        </div>
    </header>

    <main class="notifications-history-container">
        <div class="history-header">
            <h2>Todas tus notificaciones</h2>
            <div class="history-filters">
                <input type="text" id="searchNotifications" placeholder="Buscar notificaciones...">
                <select id="filterType">
                    <option value="all">Todos los tipos</option>
                    <option value="transactions">Finanzas</option>
                    <option value="tandas">Tandas</option>
                    <option value="social">Social</option>
                    <option value="system">Sistema</option>
                </select>
                <input type="date" id="filterDate">
            </div>
        </div>

        <div class="history-list" id="historyList">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i> Cargando historial...
            </div>
        </div>
        
        <div id="historySentinel" style="height: 20px;"></div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-bottom-nav">
        <a href="/home-dashboard.html" class="mobile-nav-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="/marketplace-social.html" class="mobile-nav-item"><i class="fas fa-store"></i><span>Mercado</span></a>
        <a href="/notificaciones.html" class="mobile-nav-item active"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="/mi-perfil.html" class="mobile-nav-item"><i class="fas fa-user"></i><span>Perfil</span></a>
    </nav>

    <!-- Scripts -->
    <script src="/js/components/notification-center.js"></script>
    <script src="/js/notificaciones-historial.js"></script>
</body>
</html>
