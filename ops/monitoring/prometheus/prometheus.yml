global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'tanda-validator'
    # Scrape metrics from the La Tanda Chain validator node.
    # Update the target IP/Port depending on the validator's metric exposure.
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:26660'] # Default Tendermint/Cosmos SDK metrics port
