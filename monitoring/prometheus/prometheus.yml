global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    network: latanda-testnet

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: latandad_tendermint
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/validators.yml
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__meta_filepath]
        target_label: target_source

  - job_name: cosmos_sdk_rest
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/rest-api.yml
        refresh_interval: 1m

