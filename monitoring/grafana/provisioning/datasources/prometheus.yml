
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      exemplarTraceIdDestinations:
        - name: "traceID"
          datasourceUid: "tempo"
    secureJsonData:
      httpHeaderValue1: "${GRAFANA_PROMETHEUS_AUTH}"
    version: 1
