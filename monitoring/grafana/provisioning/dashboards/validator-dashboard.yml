

apiVersion: 1

providers:
  - name: 'Validator Dashboard'
    orgId: 1
    folder: 'Validator Monitoring'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true

