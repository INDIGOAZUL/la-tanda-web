<!-- PATCH: Accessibility fixes — manual review recommended before merge -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Tanda - Inicio</title>
  <style>
    .skip-link { position: absolute; top: -40px; left: 0; background: #000; color: #fff; padding: 8px; z-index: 100; transition: top 0.3s; }
    .skip-link:focus { top: 0; }
    body { font-family: sans-serif; color: #333; background: #fff; }
    button { background: #0056b3; color: #fff; border: none; padding: 8px 16px; cursor: pointer; }
    button:hover { background: #004494; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
  <header>
    <nav>
      <ul>
        <li><a href="/">Inicio</a></li>
        <li><a href="/about">Acerca de</a></li>
      </ul>
    </nav>
  </header>
  <main id="main-content">
    <h1>Bienvenido a La Tanda</h1>
    <section>
      <h2>Ultimas noticias</h2>
      <img src="news.jpg" alt="Noticias destacadas" />
      <p>Texto de ejemplo...</p>
    </section>
    <section>
      <h2>Acciones rapidas</h2>
      <button aria-label="Buscar"><i class="fa fa-search"></i></button>
      <button aria-label="Notificaciones"><i class="fa fa-bell"></i></button>
    </section>
    <form>
      <label for="email">Correo electronico:</label>
      <input type="email" id="email" name="email" required>
      <button type="submit">Enviar</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2025 La Tanda</p>
  </footer>
</body>
</html>
