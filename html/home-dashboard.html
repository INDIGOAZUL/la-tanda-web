<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        button { cursor: pointer; padding: 8px 12px; border: 1px solid #ccc; background-color: #f0f0f0; border-radius: 4px; margin-right: 5px; }
        button.icon-only { padding: 5px; width: 30px; height: 30px; display: inline-flex; justify-content: center; align-items: center; }
        a.icon-only { text-decoration: none; color: #333; margin-left: 10px; }
        a.icon-only i { font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1>Welcome to your Dashboard</h1>
        <div>
            <button class="icon-only" aria-label="Buscar"><i class="fas fa-search"></i></button>
            <button class="icon-only" aria-label="Configuración"><i class="fas fa-cog"></i></button>
            <button class="icon-only" aria-label="Notificaciones"><i class="fas fa-bell"></i></button>
            <a href="#" class="icon-only" aria-label="Perfil de usuario"><i class="fas fa-user-circle"></i></a>
        </div>
    </div>

    <section class="main-content">
        <h2>Recent Activity</h2>
        <div class="card">
            <p>New user signed up!</p>
            <button>View Details</button>
        </div>
        <div class="card">
            <p>Your subscription is about to expire.</p>
            <button class="icon-only" aria-label="Descartar notificación"><i class="fas fa-times"></i></button>
            <button class="icon-only" aria-label="Renovar suscripción"><i class="fas fa-redo"></i></button>
        </div>
        <div class="card">
            <p>Task: "Fix frontend bug"</p>
            <a href="#" class="icon-only" aria-label="Editar tarea"><i class="fas fa-edit"></i></a>
            <button class="icon-only" aria-label="Eliminar tarea"><i class="fas fa-trash-alt"></i></button>
            <button class="icon-only" aria-label="Compartir tarea"><i class="fas fa-share-alt"></i></button>
        </div>
        <div class="card">
            <p>Post: "My thoughts on accessibility"</p>
            <button class="icon-only" aria-label="Me gusta"><i class="fas fa-heart"></i></button>
            <span>12 likes</span>
            <button class="icon-only" aria-label="Comentar publicación"><i class="fas fa-comment"></i></button>
            <span>3 comments</span>
        </div>
    </section>

    <div class="footer">
        <button class="add-item"><i class="fas fa-plus"></i> Add New Item</button>
        <button class="icon-only" aria-label="Actualizar datos"><i class="fas fa-sync-alt"></i></button>
        <a href="#" class="help-link"><i class="fas fa-question-circle"></i> Help</a>
    </div>

</body>
</html>
