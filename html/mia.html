<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA - Asistente IA | La Tanda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="css/header.css?v=26.0">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.85);
            --tanda-cyan: #00ffff;
            --tanda-cyan-dark: #00cccc;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-card: rgba(0, 255, 255, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Rajdhani", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* MIA Chat Container */
        .mia-page-container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-left: 1px solid var(--border-card);
            border-right: 1px solid var(--border-card);
        }
        
        /* MIA Header */
        .mia-page-header {
            padding: 16px 20px;
            background: rgba(0, 255, 255, 0.05);
            border-bottom: 1px solid var(--border-card);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .mia-back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .mia-back-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--tanda-cyan);
        }
        
        .mia-header-info {
            flex: 1;
        }
        
        .mia-header-title {
            font-family: "Orbitron", sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--tanda-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .mia-header-title i {
            font-size: 1.5rem;
        }
        
        .mia-header-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .mia-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #22d55e;
        }
        
        .mia-status-dot {
            width: 8px;
            height: 8px;
            background: #22d55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Chat Messages Area */
        .mia-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .mia-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .mia-message.assistant {
            align-self: flex-start;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-bottom-left-radius: 4px;
        }
        
        .mia-message ul, .mia-message ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        
        .mia-message li {
            margin: 4px 0;
        }
        
        .mia-message strong {
            color: var(--tanda-cyan);
        }
        
        .mia-message p {
            margin: 8px 0;
        }
        
        .mia-message p:first-child {
            margin-top: 0;
        }
        
        .mia-message p:last-child {
            margin-bottom: 0;
        }

        .mia-message.user {
            align-self: flex-end;
            background: var(--tanda-cyan);
            color: #000;
            border-bottom-right-radius: 4px;
        }
        
        .mia-welcome {
            text-align: center;
            padding: 40px 20px;
        }
        
        .mia-welcome-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--tanda-cyan), var(--tanda-cyan-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: #000;
        }
        
        .mia-welcome h2 {
            font-family: "Orbitron", sans-serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .mia-welcome p {
            color: var(--text-secondary);
            max-width: 400px;
            margin: 0 auto;
        }
        
        /* Quick Actions */
        .mia-quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }
        
        .mia-quick-btn {
            padding: 8px 16px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            color: var(--tanda-cyan);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mia-quick-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        /* Chat Input */
        .mia-chat-input-container {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--border-card);
        }
        
        .mia-chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .mia-chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .mia-chat-input:focus {
            border-color: var(--tanda-cyan);
        }
        
        .mia-chat-input::placeholder {
            color: var(--text-secondary);
        }
        
        .mia-send-btn {
            width: 48px;
            height: 48px;
            background: var(--tanda-cyan);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mia-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }
        
        .mia-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Voice input button */
        .mia-voice-btn {
            width: 48px;
            height: 48px;
            background: transparent;
            border: 1px solid var(--border-card);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mia-voice-btn:hover {
            border-color: var(--tanda-cyan);
            color: var(--tanda-cyan);
        }

        .mia-voice-btn.recording {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
            animation: voicePulse 1.5s infinite;
        }

        .mia-voice-btn.unsupported {
            display: none;
        }

        @keyframes voicePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        .mia-voice-status {
            text-align: center;
            font-size: 0.75rem;
            color: #ef4444;
            padding: 4px;
            display: none;
        }

        .mia-voice-status.active {
            display: block;
        }
        
        /* Loading indicator */
        .mia-typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            align-self: flex-start;
        }
        
        .mia-typing span {
            width: 8px;
            height: 8px;
            background: var(--tanda-cyan);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .mia-typing span:nth-child(2) { animation-delay: 0.2s; }
        .mia-typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }
        
        /* Proactive alerts */
        .mia-alert {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            margin: 6px 0;
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: left;
        }

        .mia-alert i {
            margin-top: 2px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .mia-alert-content {
            flex: 1;
        }

        .mia-alert-action {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .mia-alert-action:hover { opacity: 0.8; }

        .mia-alert.danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .mia-alert.danger i { color: #ef4444; }
        .mia-alert.danger .mia-alert-action {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .mia-alert.warning {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }
        .mia-alert.warning i { color: #f59e0b; }
        .mia-alert.warning .mia-alert-action {
            background: rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }

        .mia-alert.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        .mia-alert.success i { color: #22c55e; }
        .mia-alert.success .mia-alert-action {
            background: rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .mia-alert.info {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.85);
        }
        .mia-alert.info i { color: var(--tanda-cyan); }
        .mia-alert.info .mia-alert-action {
            background: rgba(0, 255, 255, 0.2);
            color: var(--tanda-cyan);
        }

        /* Action buttons */
        .mia-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            align-self: flex-start;
        }

        .mia-action-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 16px;
            color: var(--tanda-cyan);
            font-size: 0.82rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mia-action-link:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .mia-action-link i {
            font-size: 0.85rem;
        }

        .mia-source-badge {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            margin-top: 4px;
            align-self: flex-start;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .mia-page-container {
                border: none;
            }

            .mia-message {
                max-width: 90%;
            }
        }
    </style>

<body>
    <div id="global-header"></div>
    <style>.mp-header[style*="display:none"]~*,.mia-container,.inv-container{padding-top:56px!important}@media(max-width:768px){.mp-header[style*="display:none"]~*,.mia-container,.inv-container{padding-top:50px!important}}</style>

    <div class="mia-page-container">
        <!-- Header -->
        <div class="mia-page-header">
            <button class="mia-back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="mia-header-info">
                <div class="mia-header-title">
                    <i class="fas fa-robot"></i>
                    MIA
                </div>
                <div class="mia-header-subtitle">Asistente Inteligente de La Tanda</div>
            </div>
            <button class="mia-back-btn" onclick="clearChatHistory()" title="Limpiar chat" style="margin-right:8px;"><i class="fas fa-trash-alt"></i></button>
            <div class="mia-status">
                <span class="mia-status-dot"></span>
                En linea
            </div>
        </div>
        
        <!-- Chat Messages -->
        <div class="mia-chat-messages" id="chatMessages">
            <div class="mia-welcome">
                <div class="mia-welcome-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <h2>Hola, soy MIA</h2>
                <p>Tu asistente inteligente de La Tanda. Puedo ayudarte con informacion sobre tandas, el token LTD, marketplace, loteria y mas.</p>
                <div id="miaAlerts"></div>
                </div>
            </div>
        </div>
        
        <div class="mia-quick-actions" id="miaQuickActions" style="padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px;">
            <button class="mia-quick-btn" onclick="sendQuickMessage(this.textContent)">Mi resumen financiero</button>
            <button class="mia-quick-btn" onclick="sendQuickMessage(this.textContent)">Quiero pagar mi tanda</button>
            <button class="mia-quick-btn" onclick="sendQuickMessage(this.textContent)">Consejos de ahorro</button>
            <button class="mia-quick-btn" onclick="sendQuickMessage(this.textContent)">Analizar mi tienda</button>
            <button class="mia-quick-btn" onclick="sendQuickMessage(this.textContent)">Mi rendimiento de pagos</button>
            <button class="mia-quick-btn" onclick="sendQuickMessage(this.textContent)">Ayuda con una disputa</button>
        </div>
        <!-- Chat Input -->
        <div class="mia-chat-input-container">
            <div class="mia-voice-status" id="voiceStatus">Escuchando...</div>
            <div class="mia-chat-input-wrapper">
                <button class="mia-voice-btn" id="voiceBtn" onclick="toggleVoice()" aria-label="Entrada por voz">
                    <i class="fas fa-microphone"></i>
                </button>
                <textarea
                    class="mia-chat-input"
                    id="chatInput"
                    placeholder="Escribe o habla tu mensaje..."
                    rows="1"
                    aria-label="Mensaje para MIA"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="mia-send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Enviar mensaje">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // C1/C2: Auth guard — redirect if no token
        (function() {
            var token = localStorage.getItem('auth_token') || localStorage.getItem('authToken');
            if (!token) {
                localStorage.setItem('redirect_after_auth', location.href);
                location.replace('auth-enhanced.html');
            }
        })();

        const chatMessages = document.getElementById("chatMessages");
        const chatInput = document.getElementById("chatInput");
        const sendBtn = document.getElementById("sendBtn");
        let conversationHistory = [];
        let isLoading = false;
        // ===== CHAT PERSISTENCE =====
        const MIA_STORAGE_KEY = 'mia_page_chat_history';
        const MIA_MAX_MESSAGES = 50;

        function loadChatHistory() {
            try {
                const saved = localStorage.getItem(MIA_STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed)) {
                        conversationHistory = parsed.slice(-MIA_MAX_MESSAGES);
                        // Remove welcome message
                        const welcome = chatMessages.querySelector('.mia-welcome');
                        if (welcome && conversationHistory.length > 0) welcome.remove();
                        // Render saved messages
                        for (const msg of conversationHistory) {
                            addMessage(msg.role, msg.content, msg.actions, msg.source, true);
                        }
                    }
                }
            } catch (e) { /* ignore */ }
        }

        function saveChatHistory() {
            try {
                localStorage.setItem(MIA_STORAGE_KEY, JSON.stringify(conversationHistory.slice(-MIA_MAX_MESSAGES)));
            } catch (e) { /* localStorage full */ }
        }

        function clearChatHistory() {
            conversationHistory = [];
            localStorage.removeItem(MIA_STORAGE_KEY);
            chatMessages.innerHTML = '';
            // Re-add welcome
            chatMessages.innerHTML = '<div class="mia-welcome" style="text-align:center;padding:40px 20px;"><div style="font-size:3rem;margin-bottom:12px;"><i class="fas fa-robot" style="color:#00ffff;"></i></div><h3 style="color:#00ffff;font-family:Orbitron,sans-serif;margin-bottom:8px;">Hola! Soy MIA</h3><p style="color:rgba(255,255,255,0.6);font-size:0.9rem;">Tu asistente virtual inteligente</p></div>';
        }

        // Load on init
        loadChatHistory();

        function getAuthToken() {
            return localStorage.getItem('auth_token') || localStorage.getItem('authToken') || '';
        }

        // H1: Safe message formatting — escape first, then apply markdown
        function formatMessage(text) {
            const div = document.createElement('div');
            div.textContent = text;
            let escaped = div.innerHTML;
            escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            escaped = escaped.replace(/\n\n/g, '</p><p>');
            escaped = escaped.replace(/\n/g, '<br>');
            return '<p>' + escaped + '</p>';
        }

        chatInput.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        function handleKeyDown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuickMessage(text) {
            chatInput.value = text;
            sendMessage();
        }

        function addMessage(role, content, actions, source) {
            const welcome = chatMessages.querySelector(".mia-welcome");
            if (welcome) welcome.remove();
            const msgDiv = document.createElement("div");
            msgDiv.className = "mia-message " + role;
            if (role === "assistant") {
                msgDiv.innerHTML = formatMessage(content);
                // Render action buttons
                if (actions && actions.length > 0) {
                    const actionsDiv = document.createElement("div");
                    actionsDiv.className = "mia-actions";
                    for (const action of actions) {
                        const link = document.createElement("a");
                        link.className = "mia-action-link";
                        link.href = action.url;
                        link.innerHTML = '<i class="fas ' + (action.icon || 'fa-arrow-right') + '"></i> ' + formatMessage(action.label).replace(/<\/?p>/g, '');
                        actionsDiv.appendChild(link);
                    }
                    msgDiv.appendChild(actionsDiv);
                }
            } else {
                msgDiv.textContent = content;
            }
            // Timestamp
            const timeDiv = document.createElement("div");
            timeDiv.style.cssText = "font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px;padding:0 4px;" + (role==="user"?"text-align:right;":"");
            timeDiv.textContent = new Date().toLocaleTimeString("es-HN", {hour:"2-digit",minute:"2-digit"});
            msgDiv.appendChild(timeDiv);
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement("div");
            typing.className = "mia-typing";
            typing.id = "typingIndicator";
            typing.innerHTML = "<span></span><span></span><span></span>";
            chatMessages.appendChild(typing);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById("typingIndicator");
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isLoading) return;
            chatInput.value = "";
            chatInput.style.height = "auto";
            addMessage("user", message);
            isLoading = true;
            sendBtn.disabled = true;
            showTyping();
            try {
                const response = await fetch("/api/mia/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + getAuthToken()
                    },
                    body: JSON.stringify({
                        message: message,
                        conversationHistory: conversationHistory.slice(-10)
                    })
                });
                if (response.status === 401) {
                    hideTyping();
                    addMessage("assistant", "Tu sesion ha expirado. Redirigiendo al login...");
                    setTimeout(function() {
                        localStorage.setItem('redirect_after_auth', location.href);
                        location.replace('auth-enhanced.html');
                    }, 1500);
                    return;
                }
                if (response.status === 429) {
                    hideTyping();
                    addMessage("assistant", "Has enviado muchos mensajes. Espera un momento antes de continuar.");
                    return;
                }
                const data = await response.json();
                hideTyping();
                if (data.success && data.data.response) {
                    addMessage("assistant", data.data.response, data.data.actions, data.data.source);
                    conversationHistory.push(
                        { role: "user", content: message },
                        { role: "assistant", content: data.data.response }
                    );
                    saveChatHistory();
                    // L5: Cap local history
                    if (conversationHistory.length > 40) {
                        conversationHistory = conversationHistory.slice(-20);
                        saveChatHistory();
                    }
                } else {
                    addMessage("assistant", "Lo siento, hubo un error. Intenta de nuevo.");
                }
            } catch (error) {
                hideTyping();
                addMessage("assistant", "No pude conectarme al servidor. Verifica tu conexion.");
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }
        // Voice input (Web Speech API)
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        let recognition = null;
        let isRecording = false;

        (function initVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                voiceBtn.classList.add('unsupported');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'es-HN';
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                chatInput.value = transcript;
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
                // Auto-send on final result
                if (event.results[event.results.length - 1].isFinal) {
                    stopVoice();
                    if (transcript.trim()) {
                        setTimeout(function() { sendMessage(); }, 300);
                    }
                }
            };

            recognition.onerror = function(event) {
                stopVoice();
                if (event.error === 'not-allowed') {
                    addMessage('assistant', 'Necesito permiso para acceder a tu microfono. Activa el permiso en la configuracion de tu navegador.');
                }
            };

            recognition.onend = function() {
                stopVoice();
            };
        })();

        function toggleVoice() {
            if (isRecording) {
                stopVoice();
            } else {
                startVoice();
            }
        }

        function startVoice() {
            if (!recognition) return;
            try {
                recognition.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.querySelector('i').className = 'fas fa-stop';
                voiceStatus.classList.add('active');
                chatInput.placeholder = 'Habla ahora...';
            } catch (_) {}
        }

        function stopVoice() {
            if (!recognition) return;
            try { recognition.stop(); } catch (_) {}
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.querySelector('i').className = 'fas fa-microphone';
            voiceStatus.classList.remove('active');
            chatInput.placeholder = 'Escribe o habla tu mensaje...';
        }

        // Proactive alerts on page load
        (async function loadGreeting() {
            try {
                const res = await fetch("/api/mia/greeting", {
                    headers: { "Authorization": "Bearer " + getAuthToken() }
                });
                if (!res.ok) return;
                const data = await res.json();
                if (!data.success) return;
                const container = document.getElementById("miaAlerts");
                if (!container) return;
                const alerts = data.data.alerts || [];
                if (alerts.length === 0) return;
                let html = '';
                for (const a of alerts) {
                    html += '<div class="mia-alert ' + (a.type || 'info') + '">';
                    html += '<i class="fas ' + (a.icon || 'fa-info-circle') + '"></i>';
                    html += '<div class="mia-alert-content">';
                    html += '<div>' + formatMessage(a.text).replace(/<\/?p>/g, '') + '</div>';
                    if (a.action) {
                        html += '<a class="mia-alert-action" href="' + a.action.url + '">';
                        html += '<i class="fas ' + (a.action.icon || 'fa-arrow-right') + '"></i> ' + formatMessage(a.action.label).replace(/<\/?p>/g, '');
                        html += '</a>';
                    }
                    html += '</div></div>';
                }
                container.innerHTML = html;
            } catch (_) {}
        })();
    </script>
